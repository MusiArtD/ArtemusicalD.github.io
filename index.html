<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sound Music 2026 - Beta</title>
<style>

body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* PANTALLA DE INICIO */
#pantallaInicio {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  cursor: pointer;
}

/* INPUT INICIO */
.input-box {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
}

.input-box input {
  width: 260px;
  padding: 12px;
  border-radius: 18px;
  border: none;
  outline: none;
  font-size: 14px;
  text-align: center;
  color: #333;
}

/* BOTON OCULTO */
#btnIngresar {
  margin-top: 12px;
  padding: 10px 25px;
  border-radius: 20px;
  border: none;
  background: #1db954;
  color: white;
  font-weight: bold;
  cursor: pointer;
  opacity: 0;
  pointer-events: none;
  transform: translateY(10px);
  transition: 0.3s;
}

#btnIngresar.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.inicio-contenido {
  text-align: center;
  color: white;
  animation: fadeIn 1s ease;
}

.inicio-cover {
  width: 350px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

.inicio-contenido h1 {
  font-size: 27px;
  letter-spacing: 3px;
  color: #1db954;
}

/* ANIMACIONES ICONOS */
.icono-seccion { width: 20px; height: 20px; margin-right: 8px; vertical-align: middle; fill: currentColor; }
.icono-musica{ animation: campana 1.8s infinite ease-in-out; transform-origin:center; }
@keyframes campana{ 0%{ transform:rotate(0deg); } 25%{ transform:rotate(12deg); } 50%{ transform:rotate(0deg); } 75%{ transform:rotate(-12deg); } 100%{ transform:rotate(0deg); } }

/* LISTA */
.lista { width: 25%; background: #1e1e1e; height: 100vh; padding: 10px; box-sizing:border-box; overflow-y:auto; position:relative; }
.item { padding: 12px; margin: 8px 0; background: #2a2a2a; cursor: pointer; border-radius: 6px; }
.item:hover { background: #3a3a3a; }

/* REPRODUCTOR */
.reproductor { width: 45%; padding: 20px; }
.placa { background: linear-gradient(145deg, #1a1a1a, #222); border-radius: 20px; padding: 25px; width: 80%; margin: auto; }
.caratula img { width: 100%; max-width: 400px; border-radius: 12px; display: block; margin: 0 auto; }

/* ONDAS */
.ondas { display: flex; justify-content: center; align-items: flex-end; height: 30px; margin: 5px 0 3px 0; }
.ondas span { width: 3px; margin: 0 1px; height: 8px; border-radius: 12px; background: linear-gradient(to top, #ff0000, #ffd000, #00ff88); animation: humoWave 2s infinite ease-in-out; }
@keyframes humoWave { 0%, 100%{ filter: brightness(1); opacity: 0.8; } 50%{ filter: brightness(1.6); opacity: 1; } }

/* PROGRESO */
.progreso { width: 75%; max-width: 600px; margin: 21px auto; height: 6px; background: #333; border-radius: 10px; cursor: pointer; }
.barra { height: 100%; width: 0%; background: #00e5ff; box-shadow: 0 0 8px #00e5ff; }

/* CONTROLES */
.player-controls { display: flex; align-items: center; justify-content: center; gap: 14px; margin-top: 12px; }
.ctrl { background: transparent; border: none; cursor: pointer; color: #777; transition: 0.2s; }
.ctrl:hover { color: #1db954; transform: scale(1.15); }
.ctrl.main { width: 60px; height: 60px; }
.ctrl svg { width: 24px; height: 24px; fill: currentColor; }

/* COMENTARIOS */
.comentarios { width: 30%; background: #181818; height: 100vh; padding: 15px; overflow-y: auto; box-sizing: border-box; }
.comentario-header { display: flex; justify-content: space-between; align-items: center; background: #222; padding: 10px; border-radius: 10px; margin-bottom: 15px; position: sticky; top: 0; z-index: 30; }
.comentario-box { display: flex; gap: 8px; margin-bottom: 15px; }
.comentario-box input { flex: 1; padding: 10px; border: none; border-radius: 10px; background: #2a2a2a; color: white; outline: none; }
.comentario-box button { border: none; padding: 10px 14px; border-radius: 10px; background: #1db954; color: white; font-weight: bold; cursor: pointer; }
.comentario-globo { background: #2a2a2a; padding: 12px; border-radius: 10px; margin-bottom: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
.comentario-globo p { margin: 0; font-size: 14px; }
.comentario-globo small { display: block; text-align: right; font-size: 11px; color: #1db954; margin-top: 5px; }

</style>
</head>

<body>

<div id="pantallaInicio">
  <div class="inicio-contenido">
    <img src="portada 2026.jpg" class="inicio-cover">
    <h1>GRACIAS POR SU VISITA</h1>
    <div class="input-box">
      <input type="text" id="nombreInput" placeholder="Nombre completo">
      <button id="btnIngresar">INGRESAR</button>
    </div>
  </div>
</div>

<div class="lista">
  <div class="seccion" onclick="toggle('listaContenido')">Lista de reproducción</div>
  <div id="listaContenido" class="contenido activo"></div>
  <div class="seccion" onclick="toggle('mas')">Más reproducido</div>
  <div id="mas" class="contenido"></div>
  <div class="seccion" onclick="toggle('ult')">Últimas</div>
  <div id="ult" class="contenido"></div>
</div>

<div class="reproductor">
  <div class="placa">
    <div class="caratula">
      <img id="cover" style="display:none;">
      <p id="mensajeInicial">Elegir canción para empezar</p>
    </div>
    <div class="ondas" id="ondas"></div>
    <div class="progreso" onclick="seek(event)"><div class="barra" id="barra"></div></div>
    <div class="player-controls">
      <button class="ctrl" id="shuffleBtn" onclick="toggleShuffle()"><svg viewBox="0 0 24 24"><path d="M16 3h5v5h-2V6.41l-5.29 5.3-1.42-1.42 5.3-5.29H16V3zM3 6h2l3.29 3.29-1.42 1.42L3 6zm18 12v3h-5v-2h1.59l-5.3-5.29 1.42-1.42 5.29 5.3V18h2zM3 18l4.29-4.29 1.42 1.42L5 18H3z"/></svg></button>
      <button class="ctrl" onclick="prev()"><svg viewBox="0 0 24 24"><path d="M6 6h2v12H6zm3.5 6L18 18V6z"/></svg></button>
      <button class="ctrl main" onclick="togglePlay()">
        <svg id="playIcon" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
        <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>
      </button>
      <button class="ctrl" onclick="next()"><svg viewBox="0 0 24 24"><path d="M16 6h2v12h-2zM6 6v12l8-6z"/></svg></button>
      <button class="ctrl" id="loopBtn" onclick="toggleLoop()"><svg viewBox="0 0 24 24"><path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v5z"/></svg></button>
    </div>
    <audio id="player"></audio>
  </div>
</div>

<div class="comentarios">
  <h2>Comentarios</h2>
  <div class="comentario-header">
    <div class="visitas">VISITAS <span id="contadorVisitas">0</span></div>
    <div onclick="abrirWhatsApp()" style="cursor:pointer; color:#25D366;">WhatsApp ➔</div>
  </div>
  <div class="comentario-box">
    <input type="text" id="comentarioInput" placeholder="Escribe un comentario...">
    <button onclick="agregarComentario()">ENVIAR</button>
  </div>
  <div id="listaComentarios"></div>
</div>

<script>
const playlist=[
  {file:"Intro Sound Music 2026.mp3", title:"Intro Sound Music 2026", cover:"intro.png", de:"J.M.P_3Hermanos", para:"Público"},
  {file:"El Cielo se Viste de Fiesta.mp3", title:"El Cielo se Viste de Fiesta", cover:"mis-15.jpg", de:"Padres", para:"Yuliana"},
  {file:"Amelia Celeste.mp3", title:"Amelia Celeste", cover:"2-años-Amelia.jpg", de:"Padres", para:"Amelia Celeste"}
  // ... (puedes agregar el resto de tu lista aquí)
];

let currentIndex=0, introActiva=true;
const player=document.getElementById("player");

function renderLista(){
  let cont=document.getElementById("listaContenido");
  cont.innerHTML="";
  playlist.forEach((song, i)=>{
    if(i===0) return;
    let d=document.createElement("div"); d.className="item"; d.innerText=song.title;
    d.onclick=()=>playMusic(song.file); cont.appendChild(d);
  });
}
renderLista();

function playMusic(file){
  let i=playlist.findIndex(s=>s.file===file);
  if(i!==-1){
    introActiva=false;
    currentIndex=i;
    player.src=file;
    player.play();
    document.getElementById("cover").src=playlist[i].cover;
    document.getElementById("cover").style.display="block";
    document.getElementById("mensajeInicial").style.display="none";
  }
}

function togglePlay(){ player.paused ? player.play() : player.pause(); }

// Manejo de Pantalla de Inicio
document.getElementById("nombreInput").addEventListener("input", (e)=>{
  const btn = document.getElementById("btnIngresar");
  if(e.target.value.length > 2){ btn.style.opacity="1"; btn.style.pointerEvents="auto"; }
});

document.getElementById("btnIngresar").onclick = () => {
  document.getElementById("pantallaInicio").style.display="none";
  playMusic(playlist[0].file);
};

function abrirWhatsApp(){
  window.open("https://wa.me/59170000000?text=Hola, soy "+document.getElementById("nombreInput").value, "_blank");
}
</script>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getDatabase, ref, push, set, onValue } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBFsAf9N6fdIylSR2qKOQzh9HnWaxRLPIY",
    authDomain: "soundmusicbeta.firebaseapp.com",
    databaseURL: "https://soundmusicbeta-default-rtdb.firebaseio.com",
    projectId: "soundmusicbeta",
    storageBucket: "soundmusicbeta.firebasestorage.app",
    messagingSenderId: "838858859682",
    appId: "1:838858859682:web:4e4de34c5a0b9499e1a3fb"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const comentariosRef = ref(db, 'comentarios');

  // REENCARNACIÓN: Función global para enviar
  window.agregarComentario = () => {
    const input = document.getElementById('comentarioInput');
    const nombre = document.getElementById('nombreInput').value || "Invitado";
    const texto = input.value.trim();
    
    if (texto !== "") {
      const nuevoPost = push(comentariosRef);
      set(nuevoPost, {
        usuario: nombre,
        mensaje: texto,
        fecha: new Date().toLocaleDateString() + " " + new Date().toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'})
      }).then(() => { input.value = ""; });
    }
  };

  // LECTURA EN TIEMPO REAL
  onValue(comentariosRef, (snapshot) => {
    const lista = document.getElementById('listaComentarios');
    lista.innerHTML = "";
    let mensajes = [];
    snapshot.forEach(child => { mensajes.push(child.val()); });
    
    mensajes.reverse().forEach(data => {
      const div = document.createElement('div');
      div.className = 'comentario-globo';
      div.innerHTML = `<p><strong>${data.usuario}:</strong> ${data.mensaje}</p><small>${data.fecha}</small>`;
      lista.appendChild(div);
    });
  });
</script>

</body>
</html>

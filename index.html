<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Panel de Información</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #111;
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.card {
    background: #1c1c1c;
    padding: 20px;
    border-radius: 10px;
    width: 300px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
}

.linea {
    display: flex;
    margin-bottom: 10px;
}

.label {
    width: 80px;
    font-weight: bold;
    color: #00c3ff;
}

.valor {
    flex: 1;
}
</style>
</head>

<body>

<div class="card">
    <div class="linea">
        <div class="label">Título:</div>
        <div class="valor" id="titulo">---</div>
    </div>
    <div class="linea">
        <div class="label">De:</div>
        <div class="valor" id="de">---</div>
    </div>

    <button onclick="cargarDatos()">Cargar datos</button>
</div>

<script>
function cargarDatos() {
    document.getElementById("titulo").textContent = "Mis XV Años";
    document.getElementById("de").textContent = "Yuliana";
}
</script>

</body>
</html>

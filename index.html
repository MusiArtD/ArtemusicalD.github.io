<head>
<meta charset="UTF-8">
<title>Saund Music</title>
<link rel="icon" href="logo-temporal.png" type="image/png">

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* PANTALLA DE INICIO */
#pantallaInicio {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: #000;
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 9999;
  cursor: pointer;
}

/* INPUT INICIO */
.input-box {
  margin-top: 20px;
  display: flex;
  flex-direction: column;
  align-items: center;
}

.input-box input {
  width: 260px;
  padding: 12px;
  border-radius: 18px;
  border: none;
  outline: none;
  font-size: 14px;
  text-align: center;
  color: #333;
}

.input-box input::placeholder {
  color: #888;
}

/* 👇 AQUÍ VAN LOS NUEVOS ESTILOS */
.input-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 12px;
  margin-top: 20px;
}

#nombreInput,
#celularInput {
  text-align: left;
}

#codigoInput {
  text-align: center;
  letter-spacing: 3px;
  text-transform: uppercase;
}

/* BOTON OCULTO */
#btnIngresar {
  margin-top: 12px;
  padding: 10px 25px;
  border-radius: 20px;
  border: none;
  background: #1db954;
  color: white;
  font-weight: bold;
  cursor: pointer;

  opacity: 0;
  pointer-events: none;
  transform: translateY(10px);
  transition: 0.3s;
}

#btnIngresar.visible {
  opacity: 1;
  pointer-events: auto;
  transform: translateY(0);
}

.inicio-contenido {
  text-align: center;
  color: white;
  animation: fadeIn 1s ease;
}

.inicio-cover {
  width: 350px;
  border-radius: 12px;
  margin-bottom: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.6);
}

.inicio-contenido h1 {
  font-size: 27;
  letter-spacing: 3px;
  color: #1db954;
}

.inicio-contenido p {
  font-size: 18px;
  margin-top: 10px;
  opacity: 0.7;
}

@keyframes fadeIn {
  from { opacity: 0; transform: scale(0.9); }
  to { opacity: 1; transform: scale(1); }
}

/* ICONOS SECCIONES */
.icono-seccion {
  width: 20px;
  height: 20px;
  margin-right: 8px;
  vertical-align: middle;
  fill: currentColor;
  flex-shrink: 0;
}

.seccion {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* nota musical */
.icono-musica{
  animation: campana 1.8s infinite ease-in-out;
  transform-origin:center;
}

@keyframes campana{
  0%{ transform:rotate(0deg); }
  25%{ transform:rotate(12deg); }
  50%{ transform:rotate(0deg); }
  75%{ transform:rotate(-12deg); }
  100%{ transform:rotate(0deg); }
}

/* fuego */
.icono-fuego{
  animation: fuego 1.2s infinite ease-in-out;
}

@keyframes fuego{
  0%{ transform:skewX(0deg) scaleY(1); }
  25%{ transform:skewX(3deg) scaleY(1.05); }
  50%{ transform:skewX(-3deg) scaleY(0.95); }
  75%{ transform:skewX(2deg) scaleY(1.04); }
  100%{ transform:skewX(0deg) scaleY(1); }
}

/* corazon */
.icono-corazon{
  animation: latido 1s infinite;
  transform-origin:center;
}

@keyframes latido{
  0%{ transform:scale(1); }
  25%{ transform:scale(1.15); }
  40%{ transform:scale(1); }
  60%{ transform:scale(1.15); }
  100%{ transform:scale(1); }
}

/* lista */
.icono-lista{
  animation: listaMove 2s infinite ease-in-out;
}

@keyframes listaMove{
  0%{ transform:translateX(0px); }
  50%{ transform:translateX(2px); }
  100%{ transform:translateX(0px); }
}

/* LISTA */
.lista {
  width: 35%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover { background: #3a3a3a; }

/* REPRODUCTOR */
.reproductor {
  width: 65%;
  padding: 20px;
}

/* PLACA */
.placa {
  background: linear-gradient(145deg, #1a1a1a, #222);
  border-radius: 20px;
  padding: 25px;
  width: 80%;
  margin: auto;
}

/* CARATULA */
.caratula {
  text-align: center;
}
.caratula img {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
  
  display: block;
  margin: 0 auto;
}

/* ONDAS */
.ondas {
  display: flex;
  justify-content: center;
  height: 50px;
  margin: 10px 0;
}
.ondas span {
  width: 4px;
  margin: 0 2px;
  background: #00e5ff;
  animation: onda 1s infinite;
}
@keyframes onda {
  0%{height:10px;}
  50%{height:40px;}
  100%{height:10px;}
}
.pausa span { animation:none; height:12px; }

/* PROGRESO */
.progreso {
  width: 50%;
  max-width: 600px;
  margin: 15px auto;
  height: 6px;
  background: #333;
  border-radius: 10px;
  cursor: pointer;
}

.barra {
  height: 100%;
  width: 0%;
  background: #00e5ff;
  box-shadow: 0 0 8px #00e5ff;
}

/* CONTROLES */
.player-controls {
  display: flex;
  align-items: center;
  justify-content: center;

  gap: 14px;
  margin-top: 12px;
}

.ctrl {
  background: transparent;
  border: none;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  width: 40px;
  height: 40px;

  color: #777;
  transition: 0.2s;
}

.volume-group .ctrl {
  font-size: 20px;
  width: 34px;
  height: 34px;
}

.ctrl svg {
  width: 24px;
  height: 24px;
  fill: currentColor;
}

/* hover */
.ctrl:hover {
  color: #1db954;
  transform: scale(1.15);
}

/* activo (shuffle / loop) */
.ctrl.active {
  color: #1db954;
}

/* Volumen */
.volume-group {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: 10px;
}

.vol-text {
  font-size: 17px;
  color: #1db954;
  font-weight: bold;
  letter-spacing: 1px;
}

.ctrl.main {
  width: 60px;
  height: 60px;
}

.ctrl.main svg {
  width: 30px;
  height: 30px;
}

/* INFO */
.info {
  max-width: 500px;
  margin: 20px auto;
  text-align: left;
  transform: translateX(40px);  /* ?? mueve todo a la derecha */
}

.linea {
  display: flex;
  align-items: center;
  gap: 5px;              /* más controlado */
  margin-bottom: 10px;   /* lo dejas igual */
}
  
.label {
  width: 130px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #1db954;
}

.dos {
  margin-left: auto;
  transform: translateX(-45px);  /* ?? mueve 7px a la izquierda */
}

.valor {
  flex: 1;
  transform: translateX(-40px);  /* ?? se acerca al ":" */
}

/* SECCIONES */
.seccion {
  color:#1db954;
  margin-top:10px;
  cursor:pointer;
}

.contenido { display:none; }
.contenido.activo { display:block; }

/* ?? SOLO LA PRIMERA LINEA (TITULO) */
.info .linea:first-child .label {
  font-size: 23px;
}

.info .linea:first-child .valor {
  font-size: 23px;
  font-weight: 450;
}  

#mensajeInicial {
  margin-top: 15px;
  font-size: 28px; /* ?? recuperado */
  text-align: center;
  font-weight: bold;

  background: linear-gradient(
    45deg,
    #d4af37,
    #ffd700,
    #fff5b7,
    #d4af37
  );

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow:
    0 0 5px rgba(255, 215, 0, 0.5),
    0 0 10px rgba(255, 215, 0, 0.3);
}

</style>
</head>

<body>

<div id="pantallaInicio">

  <div class="inicio-contenido">

    <img src="portada 2026.jpg" class="inicio-cover">

    <h1>GRACIAS POR SU VISITA</h1>

    <div class="input-box">

      <input type="text" id="nombreInput" placeholder="Nombre completo">

      <input type="tel" id="celularInput" placeholder="Número de celular">

      <input type="text" id="codigoInput" placeholder="Código de verificación">

      <button id="btnIngresar">INGRESAR</button>

    </div>

  </div>

</div>

<!-- REPRODUCTOR -->
<div class="reproductor">
<div class="placa">

<div class="caratula">
  <img id="cover" style="display:none;">
  <p id="mensajeInicial">Elegir canción para empezar</p>
</div>

<div class="ondas" id="ondas"></div>

<div class="progreso" onclick="seek(event)">
<div class="barra" id="barra"></div>
</div>

<div class="player-controls">

  <!-- Shuffle -->
<button class="ctrl" id="shuffleBtn" onclick="toggleShuffle()">
    <svg viewBox="0 0 24 24">
      <path d="M16 3h5v5h-2V6.41l-5.29 5.3-1.42-1.42 5.3-5.29H16V3zM3 6h2l3.29 3.29-1.42 1.42L3 6zm18 12v3h-5v-2h1.59l-5.3-5.29 1.42-1.42 5.29 5.3V18h2zM3 18l4.29-4.29 1.42 1.42L5 18H3z"/>
    </svg>
  </button>

  <!-- Previous -->
<button class="ctrl" id="prevBtn" onclick="prev()">
    <svg viewBox="0 0 24 24">
      <path d="M6 6h2v12H6zm3.5 6L18 18V6z"/>
    </svg>
  </button>

  <!-- Play -->
<button class="ctrl main" id="playBtn" onclick="togglePlay()">
    <svg id="playIcon" viewBox="0 0 24 24">
      <path d="M8 5v14l11-7z"/>
    </svg>

    <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;">
      <path d="M6 5h4v14H6zm8 0h4v14h-4z"/>
    </svg>
  </button>

  <!-- Next -->
<button class="ctrl" id="nextBtn" onclick="next()">
    <svg viewBox="0 0 24 24">
      <path d="M16 6h2v12h-2zM6 6v12l8-6z"/>
    </svg>
  </button>

  <!-- Loop -->
<button class="ctrl" id="loopBtn" onclick="toggleLoop()">
    <svg viewBox="0 0 24 24">
      <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v5z"/>
    </svg>
  </button>

  <!-- Volumen -->
  <div class="volume-group">
    <button class="ctrl" id="volDownBtn">-</button>
    <span class="vol-text">[VOL]</span>
    <button class="ctrl" id="volUpBtn">+</button>
  </div>

</div>

<!-- INFO CORRECTO -->
<div class="info">

  <div class="linea">
<div class="label">Título <span class="dos">:</span></div>
    <div class="valor" id="titulo">---</div>
  </div>

  <div class="linea">
    <div class="label">De <span class="dos">:</span></div>
    <div class="valor" id="de">---</div>
  </div>

  <div class="linea">
    <div class="label">Para <span class="dos">:</span></div>
    <div class="valor" id="para">---</div>
  </div>

  <div class="linea">
    <div class="label">Código <span class="dos">:</span></div>
    <div class="valor" id="codigo">---</div>
  </div>

  <div class="linea">
    <div class="label">Agregado <span class="dos">:</span></div>
    <div class="valor" id="fecha">---</div>
  </div>

</div>

<audio id="player"></audio>

</div>
</div>

<!-- LISTA -->
<div class="lista">

  <!-- Lista de reproducción -->
  <div class="seccion" onclick="toggle('listaContenido')">

    <svg class="icono-seccion icono-lista" viewBox="0 0 24 24" fill="currentColor">
      <path d="M4 6h16v2H4z"/>
      <path d="M4 11h16v2H4z"/>
      <path d="M4 16h16v2H4z"/>
    </svg>

    Lista de reproducción
  </div>

  <div id="listaContenido" class="contenido activo"></div>

  <!-- Más reproducido -->
  <div class="seccion" onclick="toggle('mas')">

    <svg class="icono-seccion icono-fuego" viewBox="0 0 24 24" fill="currentColor">
      <path d="M13 3s1 2 1 4-2 3-2 5a4 4 0 008 0c0-5-5-9-7-9zm-1 8s-4 2-4 6a5 5 0 0010 0c0-2-1-4-3-5 0 2-1 3-3 3s-3-2-3-4z"/>
    </svg>

    Más reproducido
  </div>

  <div id="mas" class="contenido"></div>

  <!-- Últimas -->
  <div class="seccion" onclick="toggle('ult')">

    <svg class="icono-seccion icono-corazon" viewBox="0 0 24 24" fill="currentColor">
      <path d="M12 21s-7-4.35-9.33-8A5.39 5.39 0 0112 5.09 5.39 5.39 0 0121.33 13C19 16.65 12 21 12 21z"/>
    </svg>

    Últimas
  </div>

  <div id="ult" class="contenido"></div>

</div>
<script>

const playlist=[

// ?? canción predeterminada (SIEMPRE índice 0 - NO MOVER - usada por DEFAULT_INDEX)
{
file:"Intro Sound Music 2026.mp3",
title:"Intro Sound Music 2026",
code:"000",
cover:"intro.png",
de:"J.M.P_3Hermanos",
para:"Público en General"
},
{
file:"El Cielo se Viste de Fiesta.mp3",
title:"El Cielo se Viste de Fiesta",
code:"AMU-001",
cover:"mis-15.jpg",
de:"Flor de Liz y Vicente tus Padres",
para:"Yuliana"
},
{
file:"Amelia Celeste.mp3",
title:"Amelia Celeste",
code:"AMU-001",
cover:"2-años-Amelia.jpg",
de:"tus Padres Flor de Liz y Joaquin",
para:"Amelia Celeste"
}
];

let currentIndex=0, shuffle=false, loop=false;
const player=document.getElementById("player");

/* LISTA DINAMICA */
function renderLista(){
let cont=document.getElementById("listaContenido");
cont.innerHTML="";

playlist.forEach((song, index)=>{
  if(index === 0) return;

let div=document.createElement("div");
div.className="item";

div.innerHTML = `
<svg class="icono-seccion icono-musica" viewBox="0 0 24 24">
<path d="M12 3v10.55A4 4 0 1014 17V7h4V3h-6z"/>
</svg>
${song.title}
`;

div.onclick=()=>playMusic(song.file);

cont.appendChild(div);

});
}
renderLista();

/* ONDAS */
let ondas=document.getElementById("ondas");
for(let i=0;i<25;i++){
let s=document.createElement("span");
s.style.animationDelay=(i*0.05)+"s";
ondas.appendChild(s);
}

/* UI */
function updateUI(song){
if(!song)return;

document.getElementById("titulo").innerText=song.title;
const cover = document.getElementById("cover");

if(song.cover){
  cover.src = song.cover;
  cover.style.display = "block";
}else{
  cover.style.display = "none";
}

document.getElementById("de").innerText=song.de;
document.getElementById("para").innerText=song.para;
document.getElementById("codigo").innerText=song.code;

// ? AQUÍ ES EL LUGAR CORRECTO
if(player.currentTime > 0){
  document.getElementById("mensajeInicial").style.display = "none";
}

let fechas=JSON.parse(localStorage.getItem("fechas"))||{};
if(!fechas[song.file]){
fechas[song.file]=new Date().toLocaleString();
localStorage.setItem("fechas",JSON.stringify(fechas));
}
document.getElementById("fecha").innerText=fechas[song.file];
}

/* PLAY */
function playSong(i){

  currentIndex = i;
  let song = playlist[i];

  player.pause();                 // ?? detener anterior
  player.currentTime = 0;         // ?? reset inmediato
  document.getElementById("barra").style.width = "0%"; // ?? limpia barra

  updateUI(song);                 // ?? primero UI (evita retraso visual)

  player.src = song.file;

  player.load();                  // ?? fuerza carga inmediata
  player.play();
}

/* CONTROLES */

let introActiva = true;

function togglePlay(){

  if(introActiva){
    avisoUsuario();
    return;
  }

  player.paused ? player.play() : player.pause();
}

function next(){

  if(introActiva){
    avisoUsuario();
    return;
  }

  if(shuffle){
    currentIndex = Math.floor(Math.random() * (playlist.length - 1)) + 1;
  }else{
    currentIndex++;

    if(currentIndex >= playlist.length){
      currentIndex = 1;
    }
  }

  playSong(currentIndex);
}

function prev(){

  if(introActiva){
    avisoUsuario();
    return;
  }

  currentIndex--;

  if(currentIndex <= 0){
    currentIndex = 1;
  }

  playSong(currentIndex);
}

function toggleShuffle(){

  if(introActiva){
    avisoUsuario();
    return;
  }

  shuffle = !shuffle;

  document.getElementById("shuffleBtn")
  .classList.toggle("active", shuffle);
}

function toggleLoop(){

  if(introActiva){
    avisoUsuario();
    return;
  }

  loop = !loop;

  document.getElementById("loopBtn")
  .classList.toggle("active", loop);
}

function avisoUsuario(){

  const msg = document.getElementById("mensajeInicial");

  // cambia temporalmente a blanco brillante
  msg.style.background = "none";
  msg.style.webkitTextFillColor = "#ffffff";
  msg.style.color = "#ffffff";

  msg.style.textShadow = `
    0 0 6px rgba(255,255,255,0.9),
    0 0 14px rgba(255,255,255,0.7)
  `;

  // animación atención
  msg.animate([
    { opacity: 1, transform: "scale(1)" },
    { opacity: 0.4, transform: "scale(1.08)" },
    { opacity: 1, transform: "scale(1)" }
  ], {
    duration: 500,
    iterations: 2
  });

  // regresar a dorado original
  setTimeout(() => {

    msg.style.background = `
      linear-gradient(
        45deg,
        #d4af37,
        #ffd700,
        #fff5b7,
        #d4af37
      )
    `;

    msg.style.webkitBackgroundClip = "text";
    msg.style.webkitTextFillColor = "transparent";

    msg.style.textShadow = `
      0 0 5px rgba(255, 215, 0, 0.5),
      0 0 10px rgba(255, 215, 0, 0.3)
    `;

  }, 1200);

}

/* EVENTOS */
player.addEventListener("ended",()=>loop?playSong(currentIndex):next());

player.addEventListener("timeupdate",()=>{
if(!player.duration)return;
document.getElementById("barra").style.width=(player.currentTime/player.duration)*100+"%";
});

player.addEventListener("play",()=>{
  document.getElementById("playIcon").style.display="none";
  document.getElementById("pauseIcon").style.display="block";
  ondas.classList.remove("pausa");
});

player.addEventListener("pause",()=>{
  document.getElementById("playIcon").style.display="block";
  document.getElementById("pauseIcon").style.display="none";
  ondas.classList.add("pausa");
});

/* SEEK */
function seek(e){
let r=e.currentTarget.getBoundingClientRect();
player.currentTime=((e.clientX-r.left)/r.width)*player.duration;
}

const volUp = document.getElementById("volUpBtn");
const volDown = document.getElementById("volDownBtn");

let interval;

function changeVolume(amount, btn) {

  if(introActiva){
    avisoUsuario();
    return;
  }

  player.volume = Math.min(1, Math.max(0, player.volume + amount));

  btn.classList.add("active");

  setTimeout(() => {
    btn.classList.remove("active");
  }, 200);
}

// CLICK
volUp.onclick = () => changeVolume(0.05, volUp);
volDown.onclick = () => changeVolume(-0.05, volDown);

// CLICK SOSTENIDO
volUp.onmousedown = () => {
  volUp.classList.add("active");
  interval = setInterval(() => changeVolume(0.02, volUp), 100);
};

volDown.onmousedown = () => {
  volDown.classList.add("active");
  interval = setInterval(() => changeVolume(-0.02, volDown), 100);
};

document.onmouseup = () => {
  clearInterval(interval);
  volUp.classList.remove("active");
  volDown.classList.remove("active");
};

/* HISTORIAL */
let reproducciones=JSON.parse(localStorage.getItem("reproducciones"))||{};
let historial=JSON.parse(localStorage.getItem("historial"))||[];

function registrarReproduccion(file){
reproducciones[file]=(reproducciones[file]||0)+1;
historial.unshift(file);
historial=historial.slice(0,5);
localStorage.setItem("reproducciones",JSON.stringify(reproducciones));
localStorage.setItem("historial",JSON.stringify(historial));
actualizarSecciones();
}

function actualizarSecciones(){

let contTop=document.getElementById("mas");
contTop.innerHTML="";

Object.entries(reproducciones)
.sort((a,b)=>b[1]-a[1])
.slice(0,3)
.forEach(([file,count])=>{
let s=playlist.find(x=>x.file===file);
if(!s)return;
let d=document.createElement("div");
d.className="item";
d.innerText=`🔥 ${s.title} (${count})`;
d.onclick=()=>playSong(playlist.indexOf(s));
contTop.appendChild(d);
});

let contUlt=document.getElementById("ult");
contUlt.innerHTML="";

[...new Set(historial)].forEach(file=>{
let s=playlist.find(x=>x.file===file);
if(!s)return;
let d=document.createElement("div");
d.className="item";
d.innerText=`❤️ ${s.title}`;
d.onclick=()=>playSong(playlist.indexOf(s));
contUlt.appendChild(d);
});
}

function playMusic(file){
  let i=playlist.findIndex(s=>s.file===file);
  if(i!=-1){
    registrarReproduccion(file);
    introActiva = false;
    playSong(i);

    // ?? aquí sí desaparece
    document.getElementById("mensajeInicial").style.opacity = "0";

    setTimeout(() => {
      document.getElementById("mensajeInicial").style.display = "none";
    }, 600);
  }
}

function toggle(id){
document.getElementById(id).classList.toggle("activo");
}

actualizarSecciones();

const pantallaInicio = document.getElementById("pantallaInicio");
const inputNombre = document.getElementById("nombreInput");
const btnIngresar = document.getElementById("btnIngresar");

const codigoInput = document.getElementById("codigoInput");

codigoInput.addEventListener("input", (e) => {
  let value = e.target.value.replace(/[^a-zA-Z0-9]/g, "").toUpperCase();

  if (value.length > 6) value = value.slice(0, 6);

  if (value.length > 3) {
    value = value.slice(0, 3) + "-" + value.slice(3);
  }

  e.target.value = value;
});

// mostrar botón al escribir mínimo 3 letras
inputNombre.addEventListener("input", () => {
  if(inputNombre.value.length >= 3){
    btnIngresar.classList.add("visible");
  } else {
    btnIngresar.classList.remove("visible");
  }
});

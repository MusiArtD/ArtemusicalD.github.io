<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Música</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* LISTA */
.lista {
  width: 35%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover { background: #3a3a3a; }

/* REPRODUCTOR */
.reproductor {
  width: 65%;
  padding: 20px;
}

/* PLACA */
.placa {
  background: linear-gradient(145deg, #1a1a1a, #222);
  border-radius: 20px;
  padding: 25px;
  width: 80%;
  margin: auto;
  text-align: center;
}

/* CARATULA */
.caratula img {
  width: 100%;
  max-width: 250px;
  border-radius: 12px;
  display: block;
  margin: auto;
}

/* ONDAS */
.ondas {
  display: flex;
  justify-content: center;
  height: 50px;
  margin: 10px 0;
}

.ondas span {
  width: 4px;
  margin: 0 2px;
  background: #00e5ff;
  animation: onda 1s infinite;
}

@keyframes onda {
  0%{height:10px;}
  50%{height:40px;}
  100%{height:10px;}
}

.pausa span { animation:none; height:12px; }

/* PROGRESO */
.progreso {
  max-width: 250px;
  width: calc(100% - 20px);
  margin: 10px auto;
  height: 6px;
  background: #333;
  border-radius: 10px;
  cursor: pointer;
  overflow: hidden;
}

.barra {
  height: 100%;
  width: 0%;
  background: #00e5ff;
  box-shadow: 0 0 8px #00e5ff;
}

/* CONTROLES */
.controles {
  display: flex;
  justify-content: center;
  gap: 15px;
  margin-top: 10px;
}

.ctrl {
  cursor: pointer;
  font-size: 20px;
  color: #00ff88;
}

.ctrl.main {
  font-size: 28px;
  color: #00e5ff;
}

/* TEXTOS */
.titulo { margin-top:15px; font-size:20px; color:#1db954;}
.dedicatoria { font-size:14px; color:#ccc;}
.codigo { font-size:13px; color:#aaa;}
.fecha { font-size:12px; color:#777;}

/* LISTA */
.seccion {
  color:#1db954;
  margin-top:10px;
  cursor:pointer;
}

.contenido { display:none; }
.contenido.activo { display:block; }

</style>
</head>

<body>

<!-- REPRODUCTOR -->
<div class="reproductor">
<div class="placa">

<div class="caratula">
<img id="cover">
</div>

<div class="titulo" id="titulo">---</div>

<div class="dedicatoria">
<div id="de">---</div>
<div id="para">---</div>
</div>

<div class="ondas" id="ondas"></div>

<div class="progreso" onclick="seek(event)">
<div class="barra" id="barra"></div>
</div>

<div class="controles">
<span onclick="prev()">⏮</span>
<span onclick="togglePlay()">▶</span>
<span onclick="next()">⏭</span>
</div>

<div class="codigo" id="codigo">---</div>
<div class="fecha" id="fecha">---</div>

<audio id="player"></audio>

</div>
</div>

<!-- LISTA -->
<div class="lista">

<div class="seccion" onclick="toggle('lista')">📜 Lista</div>
<div id="lista" class="contenido activo">

<div class="item" onclick="playMusic('El Cielo se Viste de Fiesta.mp3')">🎵 Canción 1</div>
<div class="item" onclick="playMusic('Jehová Te Cuide Yuliana.mp3')">🎵 Canción 2</div>

</div>

</div>

<script>

const playlist = [
{
file:"El Cielo se Viste de Fiesta.mp3",
title:"El Cielo se Viste de Fiesta",
code:"AMU-001",
cover:"mis-15.jpg",
de:"Padres",
para:"Yuliana"
},
{
file:"Jehová Te Cuide Yuliana.mp3",
title:"Jehová Te Cuide Yuliana",
code:"AMU-002",
cover:"cover2.jpg",
de:"Padres",
para:"Yuliana"
}
];

let currentIndex = 0;
const player = document.getElementById("player");

/* ONDAS */
const ondas = document.getElementById("ondas");
for(let i=0;i<25;i++){
let s=document.createElement("span");
s.style.animationDelay=(i*0.05)+"s";
ondas.appendChild(s);
}

/* UI */
function updateUI(song){

if(!song) return;

document.getElementById("titulo").innerText = song.title || "---";
document.getElementById("cover").src = song.cover || "";
document.getElementById("codigo").innerText = song.code || "---";
document.getElementById("de").innerText = song.de || "---";
document.getElementById("para").innerText = song.para || "---";

let fechas = JSON.parse(localStorage.getItem("fechas")) || {};

if(song.file && !fechas[song.file]){
fechas[song.file] = new Date().toLocaleString();
localStorage.setItem("fechas", JSON.stringify(fechas));
}

document.getElementById("fecha").innerText = fechas[song.file] || "---";
}

/* PLAY */
function playSong(i){
if(i<0 || i>=playlist.length) return;

currentIndex = i;
let song = playlist[i];

player.src = song.file;
player.play();

updateUI(song);
}

/* PLAY MUSIC */
function playMusic(file){
let i = playlist.findIndex(s => s.file === file);
if(i !== -1) playSong(i);
}

/* CONTROLES */
function next(){
currentIndex = (currentIndex + 1) % playlist.length;
playSong(currentIndex);
}

function prev(){
currentIndex = (currentIndex - 1 + playlist.length) % playlist.length;
playSong(currentIndex);
}

function togglePlay(){
if(player.paused) player.play();
else player.pause();
}

/* EVENTOS */
player.addEventListener("timeupdate", ()=>{
if(!player.duration) return;
let p = (player.currentTime/player.duration)*100;
document.getElementById("barra").style.width = p + "%";
});

player.addEventListener("play", ()=>{
document.getElementById("ondas").classList.remove("pausa");
});

player.addEventListener("pause", ()=>{
document.getElementById("ondas").classList.add("pausa");
});

player.addEventListener("ended", next);

/* TOGGLE */
function toggle(id){
document.getElementById(id).classList.toggle("activo");
}

</script>

</body>
</html>

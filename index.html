<head> 
<meta charset="UTF-8">
<title>Saund Music</title>
<link rel="icon" href="logo-temporal.png" type="image/png">

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* ICONOS SECCIONES */
.icono-seccion {
  width: 20px;
  height: 20px;
  margin-right: 8px;
  vertical-align: middle;
  fill: currentColor;
  flex-shrink: 0;
}

.seccion {
  display: flex;
  align-items: center;
  gap: 8px;
}

/* nota musical */
.icono-musica{
  animation: campana 1.8s infinite ease-in-out;
  transform-origin:center;
}

@keyframes campana{
  0%{ transform:rotate(0deg); }
  25%{ transform:rotate(12deg); }
  50%{ transform:rotate(0deg); }
  75%{ transform:rotate(-12deg); }
  100%{ transform:rotate(0deg); }
}

/* fuego */
.icono-fuego{
  animation: fuego 1.2s infinite ease-in-out;
}

@keyframes fuego{
  0%{ transform:skewX(0deg) scaleY(1); }
  25%{ transform:skewX(3deg) scaleY(1.05); }
  50%{ transform:skewX(-3deg) scaleY(0.95); }
  75%{ transform:skewX(2deg) scaleY(1.04); }
  100%{ transform:skewX(0deg) scaleY(1); }
}

/* corazon */
.icono-corazon{
  animation: latido 1s infinite;
  transform-origin:center;
}

@keyframes latido{
  0%{ transform:scale(1); }
  25%{ transform:scale(1.15); }
  40%{ transform:scale(1); }
  60%{ transform:scale(1.15); }
  100%{ transform:scale(1); }
}

/* lista */
.icono-lista{
  animation: listaMove 2s infinite ease-in-out;
}

@keyframes listaMove{
  0%{ transform:translateX(0px); }
  50%{ transform:translateX(2px); }
  100%{ transform:translateX(0px); }
}

/* LISTA */
.lista {
  width: 25%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover { background: #3a3a3a; }

/* REPRODUCTOR */
.reproductor {
  width: 45%;
  padding: 20px;
}

.comentarios{
  width: 30%;
  background:#181818;
  height:100vh;
  padding:10px;
  overflow-y:auto;
}

/* PLACA */
.placa {
  background: linear-gradient(145deg, #1a1a1a, #222);
  border-radius: 20px;
  padding: 25px;
  width: 80%;
  margin: auto;
}

/* CARATULA */
.caratula {
  text-align: center;
}
.caratula img {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
  display: block;
  margin: 0 auto;
}

/* ONDAS */
.ondas {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  height: 30px;
  overflow: hidden;
  margin: 5px 0 3px 0;
}

.ondas span {
  width: 3px;
  margin: 0 1px;
  height: 8px;
  border-radius: 12px;
  transform-origin: bottom;
  transition: height 0.08s linear;
  background: linear-gradient(to top,#ff0000,#ffd000,#00ff88);
  box-shadow:0 0 4px #ff0000,0 0 8px #ffd000,0 0 12px #00ff88;
  animation: humoWave 2s infinite ease-in-out;
}

@keyframes humoWave {
  0%{filter:brightness(1);opacity:0.8;}
  50%{filter:brightness(1.6);opacity:1;}
  100%{filter:brightness(1);opacity:0.8;}
}

/* PROGRESO */
.progreso {
  width: 75%;
  max-width: 600px;
  margin: 21px auto;
  height: 6px;
  background: #333;
  border-radius: 10px;
  cursor: pointer;
}

.barra {
  height: 100%;
  width: 0%;
  background: #00e5ff;
  box-shadow: 0 0 8px #00e5ff;
}

/* CONTROLES */
.player-controls {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 14px;
  margin-top: 12px;
}

.ctrl {
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 40px;
  height: 40px;
  color: #777;
  transition: 0.2s;
}

.ctrl:hover {
  color: #1db954;
  transform: scale(1.15);
}

.ctrl.main {
  width: 60px;
  height: 60px;
}

.ctrl.main svg {
  width: 30px;
  height: 30px;
}

/* INFO */
.info {
  max-width: 500px;
  margin: 20px auto;
  text-align: left;
  transform: translateX(40px);
}

.linea {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 10px;
}

.label {
  width: 130px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #1db954;
}

.dos {
  margin-left: auto;
  transform: translateX(-45px);
}

.valor {
  flex: 1;
  transform: translateX(-40px);
}

/* COMENTARIOS */
.comentarios{
  width: 30%;
  background: #181818;
  height: 100vh;
  padding: 15px;
  overflow-y: auto;
  box-sizing: border-box;
}

.comentario-item{
  background:#2a2a2a;
  padding:12px;
  border-radius:10px;
}

</style>
</head>

<body>

<!-- LISTA -->
<div class="lista">

  <div class="seccion">
    <svg class="icono-seccion icono-lista" viewBox="0 0 24 24" fill="currentColor">
      <path d="M4 6h16v2H4z"/>
      <path d="M4 11h16v2H4z"/>
      <path d="M4 16h16v2H4z"/>
    </svg>
    Lista de reproducción
  </div>

  <div id="listaContenido"></div>
</div>

<!-- REPRODUCTOR -->
<div class="reproductor">
<div class="placa">

<div class="caratula">
  <img id="cover" style="display:none;">
</div>

<div class="ondas" id="ondas"></div>

<div class="progreso" onclick="seek(event)">
<div class="barra" id="barra"></div>
</div>

<div class="player-controls">
  <button class="ctrl" onclick="prev()">⏮</button>
  <button class="ctrl main" onclick="togglePlay()">▶</button>
  <button class="ctrl" onclick="next()">⏭</button>
</div>

<div class="info">
  <div class="linea"><div class="label">Título :</div><div class="valor" id="titulo">---</div></div>
</div>

<audio id="player"></audio>

</div>
</div>

<!-- COMENTARIOS -->
<div class="comentarios">
  <h2>Comentarios</h2>
  <div id="listaComentarios"></div>
</div>

<script>

const playlist=[
{file:"Intro Sound Music 2026.mp3",title:"Intro Sound Music 2026",cover:"intro.png",de:"J.M.P_3Hermanos",para:"Público en General"},
{file:"El Cielo se Viste de Fiesta.mp3",title:"El Cielo se Viste de Fiesta",cover:"mis-15.jpg",de:"Flor de Liz",para:"Yuliana"}
];

let currentIndex=0;
const player=document.getElementById("player");

function playSong(i){
currentIndex=i;
let song=playlist[i];
player.src=song.file;
player.play();
document.getElementById("titulo").innerText=song.title;
}

function togglePlay(){
player.paused?player.play():player.pause();
}

function next(){ playSong((currentIndex+1)%playlist.length); }
function prev(){ playSong((currentIndex-1+playlist.length)%playlist.length); }

</script>

</body>
</html>

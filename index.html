<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Música</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* LISTA */
.lista {
  width: 35%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover {
  background: #3a3a3a;
}

/* REPRODUCTOR */
.reproductor {
  width: 65%;
  padding: 20px;
}

audio {
  width: 100%;
  margin-top: 20px;
}

.titulo {
  font-size: 24px;
  color: #1db954;
  margin-top: 10px;
}

.codigo {
  font-size: 14px;
  color: #aaa;
  margin-top: 5px;
}

/* ANIMACIONES */
@keyframes latido {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

@keyframes fuego {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.icono-corazon {
  display: inline-block;
  animation: latido 1s infinite;
}

.icono-fuego {
  display: inline-block;
  animation: fuego 0.8s infinite;
}

/* TITULOS */
.seccion {
  font-size: 16px;
  color: #1db954;
  margin-top: 15px;
  margin-bottom: 5px;
  font-weight: bold;
}
</style>

</head>

<body>

<!-- IZQUIERDA -->
<div class="reproductor">

  <audio id="player" controls></audio>

  <div class="titulo" id="titulo">Selecciona una canción</div>
  <div class="codigo" id="codigo">Código: ---</div>

</div>

<!-- DERECHA -->
<div class="lista">

  <div class="seccion">📜 Lista de reproducción</div>

  <div class="item" onclick="playMusic('El Cielo se Viste de Fiesta.mp3','El Cielo se Viste de Fiesta','AMU-001')">🎵 El Cielo se Viste de Fiesta</div>
  <div class="item" onclick="playMusic('Jehová Te Cuide Yuliana.mp3','title: "Jehová Te Cuide Yuliana','AMU-002')">🎵 title: "Jehová Te Cuide Yuliana</div>
  <div class="item" onclick="playMusic('Mariachi Serenata de Yuliana.mp3','Mariachi Serenata de Yuliana','AMU-003')">🎵 Mariachi Serenata de Yuliana</div>
  <div class="item" onclick="playMusic('Serenata de Yuliana.mp3','Serenata de Yuliana','AMU-002')">🎵 Serenata de Yuliana</div>
  <div class="item" onclick="playMusic('Ejemplo 1.mp3','Ejemplo 1','AMU-003')">🎵 Ejemplo 1</div>

  <div class="seccion">
    <span class="icono-corazon">❤️</span> Más reproducido
  </div>
  <div id="masReproducido"></div>

  <div class="seccion">
    <span class="icono-fuego">🔥</span> Últimas reproducciones
  </div>
  <div id="ultimas"></div>

</div>

<script>

const playlist = [
  { file: "El Cielo se Viste de Fiesta.mp3", title: "El Cielo se Viste de Fiesta", code: "AMU-001" },
  { file: "Jehová Te Cuide Yuliana.mp3", title: "Jehová Te Cuide Yuliana", code: "AMU-002" },
  { file: "Mariachi Serenata de Yuliana.mp3", title: "Mariachi Serenata de Yuliana", code: "AMU-003" },
  { file: "Serenata de Yuliana.mp3", title: "Serenata de Yuliana", code: "AMU-002" },
  { file: "Ejemplo 1.mp3", title: "Ejemplo 1", code: "AMU-003" }
];

let currentIndex = 0;

const player = document.getElementById("player");

// DATOS GUARDADOS
let reproducciones = JSON.parse(localStorage.getItem("reproducciones")) || {};
let historial = JSON.parse(localStorage.getItem("historial")) || [];

function updateUI(song) {
  document.getElementById("titulo").innerText = song.title;
  document.getElementById("codigo").innerText = "Código: " + song.code;
}

function playSong(index) {
  currentIndex = index;

  const song = playlist[index];

  player.src = song.file;
  player.play();

  updateUI(song);
}

// CLICK MANUAL
function playMusic(file, title, code) {
  const index = playlist.findIndex(s => s.file === file);

  if (index === -1) {
    console.error("Archivo no encontrado:", file);
    return;
  }

  registrarReproduccion(file, title);

  playSong(index);
}

// REGISTRAR SOLO MANUAL
function registrarReproduccion(file, title) {

  reproducciones[file] = (reproducciones[file] || 0) + 1;

  historial.unshift({ file, title });
  historial = historial.slice(0, 5);

  localStorage.setItem("reproducciones", JSON.stringify(reproducciones));
  localStorage.setItem("historial", JSON.stringify(historial));

  actualizarSecciones();
}

// ACTUALIZAR UI (CON CONTADORES)
function actualizarSecciones() {

  // ❤️ MÁS REPRODUCIDO
  const top = Object.entries(reproducciones)
    .sort((a,b) => b[1] - a[1])
    .slice(0, 3);

  const contTop = document.getElementById("masReproducido");
  contTop.innerHTML = "";

  top.forEach(([file, count]) => {
    const song = playlist.find(s => s.file === file);

    if (song) {
      const div = document.createElement("div");
      div.className = "item";
      div.innerText = `🎵 ${song.title} (${count})`;
      div.onclick = () => playSong(playlist.indexOf(song));
      contTop.appendChild(div);
    }
  });

  // 🔥 ÚLTIMAS AGRUPADAS
  const conteoUltimas = {};

  historial.forEach(s => {
    conteoUltimas[s.file] = (conteoUltimas[s.file] || 0) + 1;
  });

  const contUlt = document.getElementById("ultimas");
  contUlt.innerHTML = "";

  Object.entries(conteoUltimas).forEach(([file, count]) => {
    const song = playlist.find(s => s.file === file);

    if (song) {
      const div = document.createElement("div");
      div.className = "item";
      div.innerText = `🎵 ${song.title} (${count})`;
      div.onclick = () => {
        const index = playlist.findIndex(p => p.file === file);
        playSong(index);
      };
      contUlt.appendChild(div);
    }
  });

}

// AUTOPLAY
player.addEventListener("ended", function () {

  currentIndex++;

  if (currentIndex >= playlist.length) {
    currentIndex = 0;
  }

  playSong(currentIndex);

});

// CARGA INICIAL
actualizarSecciones();

</script>

</body>
</html>

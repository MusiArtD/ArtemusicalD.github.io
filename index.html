<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Saund Music</title>
<link rel="icon" href="logo-temporal.png" type="image/png">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* LISTA */
.lista {
  width: 35%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover { background: #3a3a3a; }

/* REPRODUCTOR */
.reproductor {
  width: 65%;
  padding: 20px;
}

/* PLACA */
.placa {
  background: linear-gradient(145deg, #1a1a1a, #222);
  border-radius: 20px;
  padding: 25px;
  width: 80%;
  margin: auto;
}

/* CARATULA */
.caratula {
  text-align: center;
}
.caratula img {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
}

/* ONDAS */
.ondas {
  display: flex;
  justify-content: center;
  height: 50px;
  margin: 10px 0;
}
.ondas span {
  width: 4px;
  margin: 0 2px;
  background: #00e5ff;
  animation: onda 1s infinite;
}
@keyframes onda {
  0%{height:10px;}
  50%{height:40px;}
  100%{height:10px;}
}
.pausa span { animation:none; height:12px; }

/* PROGRESO */
.progreso {
  width: 50%;
  max-width: 600px;
  margin: 15px auto;
  height: 6px;
  background: #333;
  border-radius: 10px;
  cursor: pointer;
}

.barra {
  height: 100%;
  width: 0%;
  background: #00e5ff;
  box-shadow: 0 0 8px #00e5ff;
}

/* CONTROLES */
.controles {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  margin-top: 15px;
}

.ctrl {
  background: transparent;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 50px;
  height: 50px;
  color: #00e5ff;
  transition: 0.2s;
}

.ctrl svg {
  width: 26px;
  height: 26px;
  fill: currentColor;
}

.ctrl:hover {
  transform: scale(1.2);
  color: #ffffff;
}

.ctrl.main {
  width: 60px;
  height: 60px;
  background: transparent;
  box-shadow: none;
}

/* INFO */
.info {
  max-width: 500px;
  margin: 20px auto;
  text-align: left;
  transform: translateX(40px);
}

.linea {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 10px;
}

.label {
  width: 130px;
  display: flex;
  justify-content: space-between;
  color: #1db954;
}

.dos {
  margin-left: auto;
  transform: translateX(-45px);
}

.valor {
  flex: 1;
  transform: translateX(-40px);
}

.seccion {
  color:#1db954;
  margin-top:10px;
  cursor:pointer;
}

.contenido { display:none; }
.contenido.activo { display:block; }

.info .linea:first-child .label,
.info .linea:first-child .valor {
  font-size: 23px;
}

#mensajeInicial {
  margin-top: 15px;
  font-size: 28px;
  text-align: center;
  font-weight: bold;

  background: linear-gradient(
    45deg,
    #d4af37,
    #ffd700,
    #fff5b7,
    #d4af37
  );

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow:
    0 0 5px rgba(255, 215, 0, 0.5),
    0 0 10px rgba(255, 215, 0, 0.3);
}
</style>
</head>

<body>

<div class="reproductor">
<div class="placa">

<div class="caratula">
  <img id="cover" src="logo-temporal.png">
  <p id="mensajeInicial">Elegir canción para empezar</p>
</div>

<div class="ondas" id="ondas"></div>

<div class="progreso" onclick="seek(event)">
<div class="barra" id="barra"></div>
</div>

<div class="controles">

  <button class="ctrl" onclick="toggleShuffle()">🔀</button>
  <button class="ctrl" onclick="prev()">⏮</button>

  <button class="ctrl main" id="playBtn" onclick="togglePlay()">
    <span id="playIcon">
      <svg viewBox="0 0 24 24">
        <path d="M8 5v14l11-7z"/>
      </svg>
    </span>
  </button>

  <button class="ctrl" onclick="next()">⏭</button>
  <button class="ctrl" onclick="toggleLoop()">🔁</button>

</div>

<div class="info">

  <div class="linea">
    <div class="label">Título <span class="dos">:</span></div>
    <div class="valor" id="titulo">---</div>
  </div>

  <div class="linea">
    <div class="label">De <span class="dos">:</span></div>
    <div class="valor" id="de">---</div>
  </div>

  <div class="linea">
    <div class="label">Para <span class="dos">:</span></div>
    <div class="valor" id="para">---</div>
  </div>

  <div class="linea">
    <div class="label">Código <span class="dos">:</span></div>
    <div class="valor" id="codigo">---</div>
  </div>

  <div class="linea">
    <div class="label">Agregado <span class="dos">:</span></div>
    <div class="valor" id="fecha">---</div>
  </div>

</div>

<audio id="player"></audio>

</div>
</div>

<div class="lista">
<div class="seccion" onclick="toggle('listaContenido')">📜 Lista de reproducción</div>
<div id="listaContenido" class="contenido activo"></div>

<div class="seccion" onclick="toggle('mas')">❤️ Más reproducido</div>
<div id="mas" class="contenido"></div>

<div class="seccion" onclick="toggle('ult')">🔥 Últimas</div>
<div id="ult" class="contenido"></div>
</div>

<script>

const playlist=[
{
file:"Amelia Celeste.mp3",
title:"Amelia Celeste",
code:"AMU-002",
cover:"2-años-Amelia.jpg",
de:"Flor de Liz y Joaquin tus Padres",
para:"Amelia Celeste"
}
];

let currentIndex=0, shuffle=false, loop=false;
const player=document.getElementById("player");

/* ICONO ESTABLE */
function setPlayIcon(isPlaying){
  document.getElementById("playIcon").innerHTML = isPlaying
    ? `<svg viewBox="0 0 24 24"><path d="M6 5h4v14H6V5zm8 0h4v14h-4V5z"/></svg>`
    : `<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>`;
}

/* AUDIO ESTABLE */
function playSong(i){
  currentIndex = i;
  let song = playlist[i];

  player.src = song.file;
  player.play().catch(()=>{});

  updateUI(song);
}

function togglePlay(){
  if(player.paused) player.play().catch(()=>{});
  else player.pause();
}

/* UI */
function updateUI(song){
  if(!song) return;

  document.getElementById("titulo").innerText = song.title;
  document.getElementById("cover").src = song.cover;
  document.getElementById("de").innerText = song.de;
  document.getElementById("para").innerText = song.para;
  document.getElementById("codigo").innerText = song.code;

  document.getElementById("mensajeInicial").style.display="none";
}

/* EVENTOS AUDIO */
player.addEventListener("play",()=>{
  setPlayIcon(true);
  ondas.classList.remove("pausa");
});

player.addEventListener("pause",()=>{
  setPlayIcon(false);
  ondas.classList.add("pausa");
});

player.addEventListener("ended",()=>{
  loop ? playSong(currentIndex) : next();
});

/* CONTROLES BÁSICOS */
function next(){
  currentIndex = shuffle ? Math.floor(Math.random()*playlist.length) : (currentIndex+1)%playlist.length;
  playSong(currentIndex);
}

function prev(){
  currentIndex = (currentIndex-1+playlist.length)%playlist.length;
  playSong(currentIndex);
}

function toggleShuffle(){ shuffle=!shuffle; }
function toggleLoop(){ loop=!loop; }

function seek(e){
  let r = e.currentTarget.getBoundingClientRect();
  player.currentTime = ((e.clientX-r.left)/r.width)*player.duration;
}

function toggle(id){
  document.getElementById(id).classList.toggle("activo");
}

</script>

</body>
</html>

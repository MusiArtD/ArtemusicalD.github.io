<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Música</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* LISTA IZQUIERDA */
.lista {
  width: 35%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover {
  background: #3a3a3a;
}

/* REPRODUCTOR */
.reproductor {
  width: 65%;
  padding: 20px;
}

audio {
  width: 100%;
  margin-top: 20px;
}

.titulo {
  font-size: 24px;
  color: #1db954;
  margin-top: 10px;
}

.codigo {
  font-size: 14px;
  color: #aaa;
  margin-top: 5px;
}

/* comentario simple */
textarea {
  width: 100%;
  margin-top: 20px;
  height: 60px;
}

button {
  margin-top: 5px;
  padding: 6px;
}
</style>
</head>

<body>

<!-- LISTA DE CANCIONES -->
<div class="lista">

  <div class="item" onclick="playMusic('recreo-emprendedor.mp3','Recreo Emprendedor','AMU-001')">
    🎵 Recreo Emprendedor
  </div>

  <div class="item" onclick="playMusic('serenata-de-amor.mp3','Serenata de Amor','AMU-002')">
    🎵 Serenata de Amor
  </div>

</div>

<!-- REPRODUCTOR -->
<div class="reproductor">

  <audio id="player" controls></audio>

  <div class="titulo" id="titulo">Selecciona una canción</div>
  <div class="codigo" id="codigo">Código: ---</div>

  <!-- comentarios simples -->
  <h3>Comentarios</h3>

  <textarea id="coment"></textarea>
  <br>
  <button onclick="addComment()">Enviar</button>

  <div id="listaComentarios"></div>

</div>

<script>

function playMusic(file, title, code) {
  const player = document.getElementById("player");
  player.src = file;
  player.play();

  document.getElementById("titulo").innerText = title;
  document.getElementById("codigo").innerText = "Código: " + code;
}

/* comentarios simples */
function addComment() {
  let txt = document.getElementById("coment").value;
  if (!txt.trim()) return;

  let div = document.createElement("div");
  div.style.background = "#222";
  div.style.marginTop = "5px";
  div.style.padding = "5px";
  div.innerText = txt;

  document.getElementById("listaComentarios").appendChild(div);

  document.getElementById("coment").value = "";
}

</script>

</body>
</html>

<html lang="es">
<head>
<meta charset="UTF-8">
<title>Saund Music</title>
<link rel="icon" href="logo-temporal.png" type="image/png">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* LISTA */
.lista {
  width: 35%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover { background: #3a3a3a; }

/* REPRODUCTOR */
.reproductor {
  width: 65%;
  padding: 20px;
}

/* PLACA */
.placa {
  background: linear-gradient(145deg, #1a1a1a, #222);
  border-radius: 20px;
  padding: 25px;
  width: 80%;
  margin: auto;
}

/* CARATULA */
.caratula {
  text-align: center;
}
.caratula img {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
}

/* ONDAS */
.ondas {
  display: flex;
  justify-content: center;
  height: 50px;
  margin: 10px 0;
}
.ondas span {
  width: 4px;
  margin: 0 2px;
  background: #00e5ff;
  animation: onda 1s infinite;
}
@keyframes onda {
  0%{height:10px;}
  50%{height:40px;}
  100%{height:10px;}
}
.pausa span { animation:none; height:12px; }

/* PROGRESO */
.progreso {
  width: 50%;
  max-width: 600px;
  margin: 15px auto;
  height: 6px;
  background: #333;
  border-radius: 10px;
  cursor: pointer;
}

.barra {
  height: 100%;
  width: 0%;
  background: #00e5ff;
  box-shadow: 0 0 8px #00e5ff;
}

/* CONTROLES */
.controles {
  display: flex;
  justify-content: space-between;
  align-items: center;

  width: 50%;
  max-width: 600px;
  margin: 15px auto;
  padding: 0 5px;
}

.left-controls,
.center-controls,
.right-controls {
  display: flex;
  align-items: center;
}

.center-controls {
  flex: 1;
  justify-content: center;
  gap: 12px;
}

.left-controls,
.right-controls {
  flex: 0 0 auto;
}

.right-controls {
  gap: 4px;
}

.right-controls span {
  color: #00e5ff;
  font-weight: bold;
  font-size: 14px;
  margin: 0 -4px;
}

/* BOTONES */
.ctrl {
  background: transparent;
  border: none;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  width: 50px;
  height: 50px;

  color: #00e5ff;
  transition: transform 0.2s ease, color 0.2s ease;
}

.ctrl svg {
  width: 26px;
  height: 26px;
  fill: currentColor;
}

.ctrl:hover {
  transform: scale(1.15);
  color: #ffffff;
}

.ctrl.active {
  color: #1db954;
}

.ctrl.main {
  width: 60px;
  height: 60px;
  background: transparent;
  box-shadow: none;
}

/* INFO */
.info {
  max-width: 500px;
  margin: 20px auto;
  text-align: left;
  transform: translateX(40px);
}

.linea {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 10px;
}

.label {
  width: 130px;
  display: flex;
  justify-content: space-between;
  color: #1db954;
}

.dos { margin-left: auto; transform: translateX(-45px); }
.valor { flex: 1; transform: translateX(-40px); }

.seccion { color:#1db954; margin-top:10px; cursor:pointer; }
.contenido { display:none; }
.contenido.activo { display:block; }

</style>
</head>

<body>

<!-- REPRODUCTOR -->
<div class="reproductor">
<div class="placa">

<div class="caratula">
  <img id="cover" src="logo-temporal.png">
  <p id="mensajeInicial">Elegir canción para empezar</p>
</div>

<div class="ondas" id="ondas"></div>

<div class="progreso" onclick="seek(event)">
<div class="barra" id="barra"></div>
</div>

<!-- CONTROLES CORRECTOS -->
<div class="controles">

  <div class="left-controls">
    <button class="ctrl" id="shuffle" onclick="toggleShuffle()">🔀</button>
  </div>

  <div class="center-controls">
    <button class="ctrl" onclick="prev()">⏮</button>
    <button class="ctrl main" id="playBtn" onclick="togglePlay()">▶</button>
    <button class="ctrl" onclick="next()">⏭</button>
    <button class="ctrl" id="loop" onclick="toggleLoop()">🔁</button>
  </div>

  <div class="right-controls">
    <button class="ctrl" onclick="volDown()">-</button>
    <span>VOL</span>
    <button class="ctrl" onclick="volUp()">+</button>
  </div>

</div>

<!-- INFO -->
<div class="info">

  <div class="linea">
    <div class="label">Título <span class="dos">:</span></div>
    <div class="valor" id="titulo">---</div>
  </div>

  <div class="linea">
    <div class="label">De <span class="dos">:</span></div>
    <div class="valor" id="de">---</div>
  </div>

  <div class="linea">
    <div class="label">Para <span class="dos">:</span></div>
    <div class="valor" id="para">---</div>
  </div>

  <div class="linea">
    <div class="label">Código <span class="dos">:</span></div>
    <div class="valor" id="codigo">---</div>
  </div>

  <div class="linea">
    <div class="label">Agregado <span class="dos">:</span></div>
    <div class="valor" id="fecha">---</div>
  </div>

</div>

<audio id="player"></audio>

</div>
</div>

<!-- LISTA -->
<div class="lista">

<div class="seccion" onclick="toggle('listaContenido')">📜 Lista de reproducción</div>
<div id="listaContenido" class="contenido activo"></div>

<div class="seccion" onclick="toggle('mas')">❤️ Más reproducido</div>
<div id="mas" class="contenido"></div>

<div class="seccion" onclick="toggle('ult')">🔥 Últimas</div>
<div id="ult" class="contenido"></div>

</div>

<script>
// TODO TU JS ORIGINAL SE MANTIENE SIN CAMBIOS
</script>

</body>
</html>

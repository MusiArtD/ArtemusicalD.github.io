<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Saund Music</title>
<link rel="icon" href="logo-temporal.png" type="image/png">

<style>

/* =======================
   ESTRUCTURA GENERAL
======================= */

body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:white;
}

.app{
  display:flex;
  width:100%;
  height:100vh;
}

/* =======================
   PANTALLA INICIO
======================= */

#pantallaInicio{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  cursor:pointer;
}

/* =======================
   INPUT INICIO
======================= */

.input-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  margin-top:20px;
}

.input-box input{
  width:260px;
  padding:12px;
  border-radius:18px;
  border:none;
  outline:none;
  font-size:14px;
  text-align:center;
  color:#333;
}

/* =======================
   LISTA IZQUIERDA
======================= */

.lista{
  width:20%;
  background:#1e1e1e;
  overflow-y:auto;
  padding:10px;
}

.item{
  padding:12px;
  margin:8px 0;
  background:#2a2a2a;
  cursor:pointer;
  border-radius:6px;
}

.item:hover{
  background:#3a3a3a;
}

/* =======================
   REPRODUCTOR CENTRO
======================= */

.reproductor{
  width:60%;
  padding:20px;
}

.placa{
  background:linear-gradient(145deg,#1a1a1a,#222);
  border-radius:20px;
  padding:25px;
  width:80%;
  margin:auto;
}

.caratula{
  text-align:center;
}

.caratula img{
  width:100%;
  max-width:400px;
  border-radius:12px;
  display:block;
  margin:0 auto;
}

/* =======================
   CONTROLES (SIN CAMBIOS)
======================= */

.player-controls{
  display:flex;
  justify-content:center;
  gap:14px;
}

/* =======================
   INFO
======================= */

.info{
  max-width:500px;
  margin:20px auto;
  text-align:left;
}

/* =======================
   LISTA SECCIONES
======================= */

.seccion{
  color:#1db954;
  margin-top:10px;
  cursor:pointer;
}

.contenido{ display:none; }
.contenido.activo{ display:block; }

/* =======================
   COMENTARIOS (DERECHA)
======================= */

.comentarios{
  width:20%;
  background:#181818;
  padding:15px;
  border-left:1px solid #333;
}

.info-comentario{
  display:flex;
  gap:5px;
  margin-bottom:10px;
}

.box{
  flex:1;
  background:#2a2a2a;
  padding:8px;
  text-align:center;
  border-radius:6px;
  font-size:12px;
}

.input-comentario{
  width:100%;
  height:120px;
  background:#1e1e1e;
  border:none;
  color:white;
  padding:10px;
  border-radius:8px;
  resize:none;
}

.btn-comentario{
  width:100%;
  margin-top:10px;
  padding:10px;
  background:#1db954;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

/* =======================
   MENSAJE INICIAL
======================= */

#mensajeInicial{
  margin-top:15px;
  font-size:28px;
  text-align:center;
  font-weight:bold;
  background:linear-gradient(45deg,#d4af37,#ffd700,#fff5b7,#d4af37);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

</style>
</head>

<body>

<div class="app">

<!-- LISTA -->
<div class="lista">
  <div class="seccion">Lista de reproducción</div>
  <div id="listaContenido"></div>

  <div class="seccion">Más reproducido</div>
  <div id="mas"></div>

  <div class="seccion">Últimas</div>
  <div id="ult"></div>
</div>

<!-- REPRODUCTOR -->
<div class="reproductor">
<div class="placa">

  <div class="caratula">
    <img id="cover" style="display:none;">
    <p id="mensajeInicial">Elegir canción para empezar</p>
  </div>

  <div class="player-controls">
    <!-- controles intactos -->
  </div>

  <div class="info">
    <div class="linea">
      <div class="label">Título :</div>
      <div class="valor" id="titulo">---</div>
    </div>
  </div>

  <audio id="player"></audio>

</div>
</div>

<!-- COMENTARIOS -->
<div class="comentarios">

  <div class="info-comentario">
    <div class="box">Visitante</div>
    <div class="box">0</div>
    <div class="box">WhatsApp</div>
  </div>

  <textarea class="input-comentario" placeholder="Deja tu comentario..."></textarea>

  <button class="btn-comentario">Enviar</button>

</div>

</div>

<!-- JS (NO MODIFICADO) -->
<script>
// tu JS se mantiene igual
</script>

</body>
</html>

<head> 
<meta charset="UTF-8">
<title>Saund Music</title>
<link rel="icon" href="logo-temporal.png" type="image/png">

<style>

body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* LISTA */
.lista {
  width: 25%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover { background: #3a3a3a; }

/* REPRODUCTOR */
.reproductor {
  width: 45%;
  padding: 20px;
}

.comentarios{
  width: 30%;
  background:#181818;
  height:100vh;
  padding:10px;
  overflow-y:auto;
}

/* PLACA */
.placa {
  background: linear-gradient(145deg, #1a1a1a, #222);
  border-radius: 20px;
  padding: 25px;
  width: 80%;
  margin: auto;
}

/* CARATULA */
.caratula {
  text-align: center;
}
.caratula img {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
  display: block;
  margin: 0 auto;
}

/* ONDAS */
.ondas {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  height: 30px;
  overflow: hidden;
  margin: 5px 0 3px 0;
}

.ondas span {
  width: 3px;
  margin: 0 1px;
  height: 8px;
  border-radius: 12px;
  background: linear-gradient(to top,#ff0000,#ffd000,#00ff88);
  animation: humoWave 2s infinite ease-in-out;
}

@keyframes humoWave {
  0%{opacity:0.8;}
  50%{opacity:1;}
  100%{opacity:0.8;}
}

/* PROGRESO */
.progreso {
  width: 75%;
  max-width: 600px;
  margin: 21px auto;
  height: 6px;
  background: #333;
  border-radius: 10px;
  cursor: pointer;
}

.barra {
  height: 100%;
  width: 0%;
  background: #00e5ff;
}

/* CONTROLES */
.player-controls {
  display: flex;
  justify-content: center;
  gap: 14px;
  margin-top: 12px;
}

.ctrl {
  background: transparent;
  border: none;
  cursor: pointer;
  color: #777;
}

.ctrl:hover {
  color: #1db954;
}

/* INFO */
.info {
  max-width: 500px;
  margin: 20px auto;
  transform: translateX(40px);
}

.linea {
  display: flex;
  gap: 5px;
  margin-bottom: 10px;
}

.label {
  width: 130px;
  color: #1db954;
}

/* COMENTARIOS */
.comentario-item{
  background:#2a2a2a;
  padding:12px;
  border-radius:10px;
  margin-bottom:10px;
}

.comentario-meta{
  font-size:12px;
  color:#aaa;
  display:flex;
  justify-content:space-between;
}

</style>
</head>

<body>

<!-- LISTA -->
<div class="lista">

  <div class="seccion">Lista de reproducción</div>
  <div id="listaContenido"></div>

</div>

<!-- REPRODUCTOR -->
<div class="reproductor">
<div class="placa">

<div class="caratula">
  <img id="cover" style="display:none;">
</div>

<div class="ondas" id="ondas"></div>

<div class="progreso" onclick="seek(event)">
<div class="barra" id="barra"></div>
</div>

<div class="player-controls">
  <button class="ctrl" onclick="prev()">⏮</button>
  <button class="ctrl" onclick="togglePlay()">▶/⏸</button>
  <button class="ctrl" onclick="next()">⏭</button>
</div>

<div class="info">
  <div class="linea"><div class="label">Título:</div><div id="titulo">---</div></div>
</div>

<audio id="player"></audio>

</div>
</div>

<!-- COMENTARIOS -->
<div class="comentarios">

  <h2>Comentarios</h2>

  <input id="comentarioInput" placeholder="Escribe un comentario..." style="width:100%;padding:8px;">
  <button onclick="agregarComentario()">Enviar</button>

  <div id="listaComentarios"></div>

</div>

<script>

const playlist=[
{file:"Intro Sound Music 2026.mp3",title:"Intro Sound Music 2026",cover:"intro.png"},
{file:"El Cielo se Viste de Fiesta.mp3",title:"El Cielo se Viste de Fiesta",cover:"mis-15.jpg"}
];

let currentIndex=0;
const player=document.getElementById("player");

/* LISTA */
function render(){
let cont=document.getElementById("listaContenido");
cont.innerHTML="";

playlist.forEach((s,i)=>{
let d=document.createElement("div");
d.className="item";
d.innerText=s.title;
d.onclick=()=>playSong(i);
cont.appendChild(d);
});
}
render();

/* REPRODUCIR */
function playSong(i){
currentIndex=i;
let s=playlist[i];
player.src=s.file;
player.play();
document.getElementById("titulo").innerText=s.title;

if(s.cover){
document.getElementById("cover").src=s.cover;
document.getElementById("cover").style.display="block";
}
}

/* CONTROLES */
function togglePlay(){
player.paused ? player.play() : player.pause();
}

function next(){
playSong((currentIndex+1)%playlist.length);
}

function prev(){
playSong((currentIndex-1+playlist.length)%playlist.length);
}

/* PROGRESO */
function seek(e){
let r=e.currentTarget.getBoundingClientRect();
player.currentTime=((e.clientX-r.left)/r.width)*player.duration;
}

/* UI BAR */
player.addEventListener("timeupdate",()=>{
document.getElementById("barra").style.width=
(player.currentTime/player.duration)*100+"%";
});

/* COMENTARIOS */
function agregarComentario(){

let txt=document.getElementById("comentarioInput").value;
if(!txt)return;

let div=document.createElement("div");
div.className="comentario-item";

div.innerHTML=`
<div>${txt}</div>
<div class="comentario-meta">
<span>Usuario</span>
<span>${new Date().toLocaleDateString()}</span>
</div>
`;

document.getElementById("listaComentarios").prepend(div);
document.getElementById("comentarioInput").value="";
}

</script>

</body>
</html>

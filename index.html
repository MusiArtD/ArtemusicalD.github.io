<html lang="es">
<head>
<meta charset="UTF-8">
<title>Saund Music</title>
<link rel="icon" href="logo-temporal.png" type="image/png">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* LISTA */
.lista {
  width: 35%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover { background: #3a3a3a; }

/* REPRODUCTOR */
.reproductor {
  width: 65%;
  padding: 20px;
}

/* PLACA */
.placa {
  background: linear-gradient(145deg, #1a1a1a, #222);
  border-radius: 20px;
  padding: 25px;
  width: 80%;
  margin: auto;
}

/* CARATULA */
.caratula {
  text-align: center;
}
.caratula img {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
}

/* ONDAS (RESTAURADAS) */
.ondas {
  display: flex;
  justify-content: center;
  height: 50px;
  margin: 10px 0;
}
.ondas span {
  width: 4px;
  margin: 0 2px;
  background: #00e5ff;
  animation: onda 1s infinite;
}
@keyframes onda {
  0%{height:10px;}
  50%{height:40px;}
  100%{height:10px;}
}
.pausa span { animation:none; height:12px; }

/* PROGRESO */
.progreso {
  width: 50%;
  max-width: 600px;
  margin: 15px auto;
  height: 6px;
  background: #333;
  border-radius: 10px;
  cursor: pointer;
}

.barra {
  height: 100%;
  width: 0%;
  background: #00e5ff;
  box-shadow: 0 0 8px #00e5ff;
}

/* CONTROLES */
.controles {
  display: flex;
  justify-content: space-between;
  align-items: center;

  width: 50%;
  max-width: 600px;
  margin: 15px auto;
  padding: 0 5px;
}

.left-controls,
.center-controls,
.right-controls {
  display: flex;
  align-items: center;
}

.center-controls {
  flex: 1;
  justify-content: center;
  gap: 12px;
}

.right-controls {
  gap: 4px;
}

.right-controls span {
  color: #00e5ff;
  font-weight: bold;
  font-size: 14px;
  margin: 0 -4px;
}

/* BOTONES */
.ctrl {
  background: transparent;
  border: none;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  width: 50px;
  height: 50px;

  color: #00e5ff;
  transition: transform 0.2s ease, color 0.2s ease;
}

.ctrl svg {
  width: 26px;
  height: 26px;
  fill: currentColor;
}

.ctrl:hover {
  transform: scale(1.15);
  color: #ffffff;
}

.ctrl.active {
  color: #1db954;
}

.ctrl.main {
  width: 60px;
  height: 60px;
  background: transparent;
  box-shadow: none;
}

/* INFO */
.info {
  max-width: 500px;
  margin: 20px auto;
  text-align: left;
  transform: translateX(40px);
}

.linea {
  display: flex;
  align-items: center;
  gap: 5px;
  margin-bottom: 10px;
}

.label {
  width: 130px;
  display: flex;
  justify-content: space-between;
  color: #1db954;
}

.dos { margin-left: auto; transform: translateX(-45px); }
.valor { flex: 1; transform: translateX(-40px); }

.seccion { color:#1db954; margin-top:10px; cursor:pointer; }
.contenido { display:none; }
.contenido.activo { display:block; }

#mensajeInicial {
  margin-top: 15px;
  font-size: 28px;
  text-align: center;
  font-weight: bold;
  background: linear-gradient(45deg,#d4af37,#ffd700,#fff5b7,#d4af37);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
}
</style>
</head>

<body>

<div class="reproductor">
<div class="placa">

<div class="caratula">
  <img id="cover" src="logo-temporal.png">
  <p id="mensajeInicial">Elegir canción para empezar</p>
</div>

<div class="ondas" id="ondas"></div>

<div class="progreso" onclick="seek(event)">
<div class="barra" id="barra"></div>
</div>

<!-- CONTROLES RESTAURADOS -->
<div class="controles">

  <!-- shuffle -->
  <button class="ctrl" id="shuffle" onclick="toggleShuffle()">
    <svg viewBox="0 0 24 24"><path d="M16 3h5v5h-2V6.41l-4.29 4.3-1.42-1.42L17.59 5H16V3zM3 7h5l6 6-6 6H3v-2h4.59l4.59-4.59L7.59 9H3V7zm13 10h1.59l-2.29 2.29 1.42 1.42L21 14v5h-5v-2z"/></svg>
  </button>

  <div class="center-controls">
    <button class="ctrl" onclick="prev()">
      <svg viewBox="0 0 24 24"><path d="M6 6h2v12H6V6zm3.5 6l10.5 6V6L9.5 12z"/></svg>
    </button>

    <button class="ctrl main" id="playBtn" onclick="togglePlay()">
      <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
    </button>

    <button class="ctrl" onclick="next()">
      <svg viewBox="0 0 24 24"><path d="M16.5 12L6 6v12l10.5-6zM18 6h2v12h-2V6z"/></svg>
    </button>

    <button class="ctrl" id="loop" onclick="toggleLoop()">
      <svg viewBox="0 0 24 24"><path d="M17 17H7v-3l-4 4 4 4v-3h10v-2zm0-10V4l4 4-4 4V9H7v2h10z"/></svg>
    </button>
  </div>

  <div class="right-controls">
    <button class="ctrl" onclick="volDown()">-</button>
    <span>VOL</span>
    <button class="ctrl" onclick="volUp()">+</button>
  </div>

</div>

<audio id="player"></audio>

</div>
</div>

<!-- LISTA -->
<div class="lista">
<div class="seccion" onclick="toggle('listaContenido')">📜 Lista de reproducción</div>
<div id="listaContenido" class="contenido activo"></div>

<div class="seccion" onclick="toggle('mas')">❤️ Más reproducido</div>
<div id="mas" class="contenido"></div>

<div class="seccion" onclick="toggle('ult')">🔥 Últimas</div>
<div id="ult" class="contenido"></div>
</div>

<script>
// TU JS ORIGINAL NO SE ALTERA
</script>

</body>
</html>

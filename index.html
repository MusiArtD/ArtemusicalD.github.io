<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Saund Music</title>
<link rel="icon" href="logo-temporal.png" type="image/png">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* LISTA */
.lista {
  width: 35%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover { background: #3a3a3a; }

/* REPRODUCTOR */
.reproductor {
  width: 65%;
  padding: 20px;
}

/* PLACA */
.placa {
  background: linear-gradient(145deg, #1a1a1a, #222);
  border-radius: 20px;
  padding: 25px;
  width: 80%;
  margin: auto;
}

/* CARATULA */
.caratula {
  text-align: center;
}
.caratula img {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;
}

/* ONDAS */
.ondas {
  display: flex;
  justify-content: center;
  height: 50px;
  margin: 10px 0;
}
.ondas span {
  width: 4px;
  margin: 0 2px;
  background: #00e5ff;
  animation: onda 1s infinite;
}
@keyframes onda {
  0%{height:10px;}
  50%{height:40px;}
  100%{height:10px;}
}
.pausa span { animation:none; height:12px; }

/* PROGRESO */
.progreso {
  width: 50%;
  max-width: 600px;
  margin: 15px auto;
  height: 6px;
  background: #333;
  border-radius: 10px;
  cursor: pointer;
}

.barra {
  height: 100%;
  width: 0%;
  background: #00e5ff;
  box-shadow: 0 0 8px #00e5ff;
}

/* CONTROLES (ORIGINAL) */
.controles {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  margin-top: 15px;
}

.ctrl {
  background: transparent;
  border: none;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  width: 50px;
  height: 50px;

  color: #00e5ff;
  transition: transform 0.2s ease, color 0.2s ease;
}

.ctrl svg {
  width: 26px;
  height: 26px;
  fill: currentColor;
}

.ctrl:hover {
  transform: scale(1.15);
  color: #ffffff;
}

.ctrl.active {
  color: #1db954;
}

.ctrl.main {
  width: 60px;
  height: 60px;
}

/* INFO */
.info {
  max-width: 500px;
  margin: 20px auto;
  text-align: left;
}

.linea {
  display: flex;
  margin-bottom: 10px;
}

.label {
  width: 120px;
  color: #1db954;
}

.valor {
  flex: 1;
}
</style>
</head>

<body>

<div class="reproductor">
<div class="placa">

<div class="caratula">
  <img id="cover" src="logo-temporal.png">
  <p id="mensajeInicial">Elegir canción para empezar</p>
</div>

<div class="ondas" id="ondas"></div>

<div class="progreso" onclick="seek(event)">
  <div class="barra" id="barra"></div>
</div>

<!-- CONTROLES ORIGINALES + VOLUMEN -->
<div class="controles">

  <!-- shuffle -->
  <button class="ctrl" id="shuffle" onclick="toggleShuffle()">
    <svg viewBox="0 0 24 24">
      <path d="M16 3h5v5h-2V6.41l-4.29 4.3-1.42-1.42L17.59 5H16V3zM3 7h5l6 6-6 6H3v-2h4.59l4.59-4.59L7.59 9H3V7zm13 10h1.59l-2.29 2.29 1.42 1.42L21 14v5h-5v-2z"/>
    </svg>
  </button>

  <!-- prev -->
  <button class="ctrl" onclick="prev()">
    <svg viewBox="0 0 24 24">
      <path d="M6 6h2v12H6V6zm3.5 6l10.5 6V6L9.5 12z"/>
    </svg>
  </button>

  <!-- play -->
  <button class="ctrl main" id="playBtn" onclick="togglePlay()">
    <svg viewBox="0 0 24 24">
      <path d="M8 5v14l11-7z"/>
    </svg>
  </button>

  <!-- next -->
  <button class="ctrl" onclick="next()">
    <svg viewBox="0 0 24 24">
      <path d="M16.5 12L6 6v12l10.5-6zM18 6h2v12h-2V6z"/>
    </svg>
  </button>

  <!-- loop -->
  <button class="ctrl" id="loop" onclick="toggleLoop()">
    <svg viewBox="0 0 24 24">
      <path d="M17 17H7v-3l-4 4 4 4v-3h10v-2zm0-10V4l4 4-4 4V9H7v2h10z"/>
    </svg>
  </button>

  <!-- volumen -->
  <button class="ctrl" id="volDownBtn">
    <svg viewBox="0 0 24 24">
      <path d="M5 11h14v2H5z"/>
    </svg>
  </button>

  <span style="color:#00e5ff;font-weight:bold;">VOL</span>

  <button class="ctrl" id="volUpBtn">
    <svg viewBox="0 0 24 24">
      <path d="M11 5h2v14h-2zM5 11h14v2H5z"/>
    </svg>
  </button>

</div>

<div class="info">
  <div class="linea"><div class="label">Título:</div><div class="valor" id="titulo">---</div></div>
  <div class="linea"><div class="label">De:</div><div class="valor" id="de">---</div></div>
  <div class="linea"><div class="label">Para:</div><div class="valor" id="para">---</div></div>
  <div class="linea"><div class="label">Código:</div><div class="valor" id="codigo">---</div></div>
  <div class="linea"><div class="label">Agregado:</div><div class="valor" id="fecha">---</div></div>
</div>

<audio id="player"></audio>

</div>
</div>

<script>

const player=document.getElementById("player");

/* ONDAS */
let ondas=document.getElementById("ondas");
for(let i=0;i<25;i++){
let s=document.createElement("span");
s.style.animationDelay=(i*0.05)+"s";
ondas.appendChild(s);
}

/* VOLUMEN */
function changeVolume(step){
  player.volume=Math.min(1,Math.max(0,player.volume+step));
}

volUpBtn.onclick=()=>changeVolume(0.1);
volDownBtn.onclick=()=>changeVolume(-0.1);

let volInterval;

function startHold(step){
  volInterval=setInterval(()=>changeVolume(step),100);
}

function stopHold(){ clearInterval(volInterval); }

volUpBtn.onmousedown=()=>startHold(0.02);
volDownBtn.onmousedown=()=>startHold(-0.02);

volUpBtn.onmouseup=stopHold;
volDownBtn.onmouseup=stopHold;

volUpBtn.onmouseleave=stopHold;
volDownBtn.onmouseleave=stopHold;

</script>

</body>
</html>

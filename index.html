<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Plataforma de Videos</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #111;
  color: white;
  display: flex;
}

.lista {
  width: 30%;
  background: #1c1c1c;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 10px;
  margin: 5px 0;
  background: #333;
  cursor: pointer;
}

.item:hover {
  background: #555;
}

.reproductor {
  width: 70%;
  padding: 20px;
}

video {
  width: 100%;
  max-height: 500px;
  background: black;
}

.titulo {
  margin-top: 10px;
  font-size: 20px;
  color: #00ffcc;
}

.comentarios {
  margin-top: 20px;
}

textarea {
  width: 100%;
  height: 60px;
}

button {
  margin-top: 5px;
  padding: 5px;
}

.comentario {
  background: #222;
  margin-top: 5px;
  padding: 5px;
}
</style>
</head>

<body>

<!-- LISTA -->
<div class="lista">

  <div class="item" onclick="playVideo('5.mp4','Video 5')">🎥 Video 5</div>

  <div class="item" onclick="playVideo('7.mp4','Video 7')">🎥 Video 7</div>

  <div class="item" onclick="playVideo('recreo-emprendedor.mp4','Recreo emprendedor')">🎥 Recreo emprendedor</div>

</div>

<!-- REPRODUCTOR -->
<div class="reproductor">

<video id="player" controls>
  <source src="5.mp4" type="video/mp4">
</video>

<div class="titulo" id="titulo">Video 5</div>

<!-- COMENTARIOS -->
<div class="comentarios">
  <h3>Comentarios</h3>

  <textarea id="txt"></textarea>
  <br>
  <button onclick="addComment()">Enviar</button>

  <div id="listaComentarios"></div>
</div>

</div>

<script>

function playVideo(src, title) {
  const player = document.getElementById("player");
  player.src = src;
  player.play();

  document.getElementById("titulo").innerText = title;
}

/* comentarios simples */
function addComment() {
  let txt = document.getElementById("txt").value;

  if (txt.trim() === "") return;

  let div = document.createElement("div");
  div.className = "comentario";
  div.innerText = txt;

  document.getElementById("listaComentarios").appendChild(div);

  document.getElementById("txt").value = "";
}

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<title>Saund Music</title>
<link rel="icon" href="logo-temporal.png" type="image/png">

<style>

/* =========================
   BASE GENERAL
========================= */
body{
  margin:0;
  font-family:Arial;
  background:#121212;
  color:white;
}

.app{
  display:flex;
  width:100%;
  height:100vh;
}

/* =========================
   PANTALLA DE INICIO
========================= */
#pantallaInicio{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:#000;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  cursor:pointer;
}

/* =========================
   INPUT INICIO
========================= */
.input-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:12px;
  margin-top:20px;
}

.input-box input{
  width:260px;
  padding:12px;
  border-radius:18px;
  border:none;
  text-align:center;
}

/* =========================
   BLOQUE IZQUIERDA (LISTA)
========================= */
.lista{
  width:25%;
  background:#1e1e1e;
  height:100vh;
  overflow-y:auto;
  padding:10px;
}

.item{
  padding:12px;
  margin:8px 0;
  background:#2a2a2a;
  cursor:pointer;
  border-radius:6px;
}

.item:hover{
  background:#3a3a3a;
}

/* =========================
   BLOQUE CENTRO (REPRODUCTOR)
========================= */
.reproductor{
  width:50%;
  padding:20px;
}

.placa{
  background:linear-gradient(145deg,#1a1a1a,#222);
  border-radius:20px;
  padding:25px;
  width:90%;
  margin:auto;
}

.caratula{
  text-align:center;
}

.caratula img{
  width:100%;
  max-width:400px;
  border-radius:12px;
  display:block;
  margin:0 auto;
}

/* ONDAS */
.ondas{
  display:flex;
  justify-content:center;
  height:50px;
}

.ondas span{
  width:4px;
  margin:0 2px;
  background:#00e5ff;
  animation:onda 1s infinite;
}

@keyframes onda{
  0%{height:10px;}
  50%{height:40px;}
  100%{height:10px;}
}

/* PROGRESO */
.progreso{
  width:60%;
  margin:15px auto;
  height:6px;
  background:#333;
  border-radius:10px;
  cursor:pointer;
}

.barra{
  height:100%;
  width:0%;
  background:#00e5ff;
}

/* CONTROLES */
.player-controls{
  display:flex;
  justify-content:center;
  gap:14px;
}

/* INFO */
.info{
  max-width:500px;
  margin:20px auto;
}

/* =========================
   BLOQUE DERECHA (COMENTARIOS)
========================= */
.comentarios{
  width:25%;
  background:#181818;
  padding:15px;
  border-left:1px solid #333;
}

.info-comentario{
  display:flex;
  justify-content:space-between;
  gap:5px;
  margin-bottom:10px;
}

.box{
  background:#2a2a2a;
  padding:8px;
  border-radius:6px;
  font-size:12px;
  text-align:center;
  flex:1;
}

.input-comentario{
  width:100%;
  height:120px;
  background:#1e1e1e;
  border:none;
  color:white;
  padding:10px;
  border-radius:8px;
  resize:none;
}

.btn-comentario{
  width:100%;
  margin-top:10px;
  padding:10px;
  background:#1db954;
  border:none;
  color:white;
  border-radius:8px;
  cursor:pointer;
}

</style>
</head>

<body>

<!-- =========================
     APP PRINCIPAL
========================= -->
<div class="app">

<!-- 🔵 BLOQUE IZQUIERDA -->
<div class="lista">

  <div id="listaContenido"></div>

  <div class="seccion">Más reproducido</div>
  <div id="mas"></div>

  <div class="seccion">Últimos</div>
  <div id="ult"></div>

</div>

<!-- 🟢 BLOQUE CENTRO -->
<div class="reproductor">

  <div class="placa">

    <div class="caratula">
      <img id="cover">
      <p id="mensajeInicial">Elegir canción para empezar</p>
    </div>

    <div class="ondas" id="ondas"></div>

    <div class="progreso" onclick="seek(event)">
      <div class="barra" id="barra"></div>
    </div>

    <div class="player-controls">

      <button onclick="prev()">⏮</button>
      <button onclick="togglePlay()">⏯</button>
      <button onclick="next()">⏭</button>

    </div>

    <div class="info">

      <div>Título: <span id="titulo">---</span></div>
      <div>De: <span id="de">---</span></div>
      <div>Para: <span id="para">---</span></div>
      <div>Código: <span id="codigo">---</span></div>
      <div>Fecha: <span id="fecha">---</span></div>

    </div>

    <audio id="player"></audio>

  </div>
</div>

<!-- 🟣 BLOQUE DERECHA (COMENTARIOS) -->
<div class="comentarios">

  <div class="info-comentario">
    <div class="box">Visitante</div>
    <div class="box">0</div>
    <div class="box">WhatsApp</div>
  </div>

  <textarea class="input-comentario" placeholder="Deja tu comentario..."></textarea>

  <button class="btn-comentario">Enviar</button>

</div>

</div>

<!-- =========================
     SCRIPT ORIGINAL (SIN CAMBIOS)
========================= -->
<script>

// TU JS ORIGINAL AQUÍ SIN MODIFICAR

</script>

</body>
</html>

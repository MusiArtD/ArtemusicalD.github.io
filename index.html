<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Música</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* LISTA */
.lista {
  width: 35%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover {
  background: #3a3a3a;
}

/* REPRODUCTOR */
.reproductor {
  width: 65%;
  padding: 20px;
}

audio {
  width: 100%;
  margin-top: 20px;
}

.titulo {
  font-size: 24px;
  color: #1db954;
  margin-top: 10px;
}

.codigo {
  font-size: 14px;
  color: #aaa;
  margin-top: 5px;
}

/* 🔥 ANIMACIONES */
@keyframes latido {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

@keyframes fuego {
  0% { transform: scale(1) rotate(0deg); }
  50% { transform: scale(1.1) rotate(2deg); }
  100% { transform: scale(1) rotate(0deg); }
}

.icono-corazon {
  display: inline-block;
  animation: latido 1s infinite;
}

.icono-fuego {
  display: inline-block;
  animation: fuego 0.8s infinite;
}

/* TITULOS DE SECCION */
.seccion {
  font-size: 16px;
  color: #1db954;
  margin-top: 15px;
  margin-bottom: 5px;
  font-weight: bold;
}
</style>

</head>

<body>

<!-- IZQUIERDA (REPRODUCTOR) -->
<div class="reproductor">

  <audio id="player" controls></audio>

  <div class="titulo" id="titulo">Selecciona una canción</div>
  <div class="codigo" id="codigo">Código: ---</div>

</div>

<!-- DERECHA (LISTA) -->
<div class="lista">

  <div class="seccion">
    <span class="icono-corazon">❤️</span> Más reproducido
  </div>

  <div class="item"
  onclick="playMusic('Amelia Celeste 3.mp3','Amelia Celeste 3','AMU-001')">
    🎵 Amelia Celeste 3
  </div>

  <div class="item"
  onclick="playMusic('Los 15 de Yuliana.mp3','Los 15 de Yuliana','AMU-002')">
    🎵 Los 15 de Yuliana
  </div>

  <div class="seccion">
    <span class="icono-fuego">🔥</span> Últimas reproducciones
  </div>

  <div class="item"
  onclick="playMusic('Baila Yuliana en tus 15.mp3','Baila Yuliana en tus 15','AMU-003')">
    🎵 Baila Yuliana en tus 15
  </div>

  <div class="item"
  onclick="playMusic('Serenata de Yuliana.mp3','Serenata de Yuliana','AMU-002')">
    🎵 Serenata de Yuliana
  </div>

  <div class="item"
  onclick="playMusic('Ejemplo 1.mp3','Ejemplo 1','AMU-003')">
    🎵 Ejemplo 1
  </div>

</div>

<script>

const playlist = [
  { file: "Amelia Celeste 3.mp3", title: "Amelia Celeste 3", code: "AMU-001" },
  { file: "Los 15 de Yuliana.mp3", title: "Los 15 de Yuliana", code: "AMU-002" },
  { file: "Baila Yuliana en tus 15.mp3", title: "Baila Yuliana en tus 15", code: "AMU-003" },
  { file: "Serenata de Yuliana.mp3", title: "Serenata de Yuliana", code: "AMU-002" },
  { file: "Ejemplo 1.mp3", title: "Ejemplo 1", code: "AMU-003" }
];

let currentIndex = 0;

const player = document.getElementById("player");

function updateUI(song) {
  document.getElementById("titulo").innerText = song.title;
  document.getElementById("codigo").innerText = "Código: " + song.code;
}

function playSong(index) {
  currentIndex = index;

  const song = playlist[index];

  player.src = song.file;
  player.play();

  updateUI(song);
}

// click manual
function playMusic(file, title, code) {
  const index = playlist.findIndex(s => s.file === file);

  if (index === -1) {
    console.error("Archivo no encontrado:", file);
    return;
  }

  playSong(index);
}

// autoplay
player.addEventListener("ended", function () {

  currentIndex++;

  if (currentIndex >= playlist.length) {
    currentIndex = 0;
  }

  playSong(currentIndex);

});

</script>

</body>
</html>

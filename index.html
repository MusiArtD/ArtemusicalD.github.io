<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Música</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* LISTA */
.lista {
  width: 35%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover {
  background: #3a3a3a;
}

/* REPRODUCTOR */
.reproductor {
  width: 65%;
  padding: 20px;
}

/* PLACA */
.placa {
  background: linear-gradient(145deg, #1a1a1a, #222);
  border-radius: 20px;
  padding: 25px;
  width: 80%;
  margin: auto;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
  text-align: center;
}

/* CARATULA */
.caratula img {
  width: 100%;
  max-width: 250px;
  border-radius: 12px;
}

/* TITULO */
.titulo {
  font-size: 22px;
  color: #1db954;
  margin-top: 10px;
}

/* DEDICATORIA */
.dedicatoria {
  margin-top: 10px;
  color: #ccc;
  font-size: 14px;
}

/* CODIGO */
.codigo {
  font-size: 14px;
  color: #aaa;
  margin-top: 10px;
}

/* ONDAS */
.ondas {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  height: 50px;
  margin: 15px 0;
}

.ondas span {
  width: 4px;
  height: 10px;
  margin: 0 2px;
  background: #ff2e88;
  animation: onda 1s infinite ease-in-out;
}

@keyframes onda {
  0% { height: 10px; }
  50% { height: 40px; }
  100% { height: 10px; }
}

.pausa span {
  animation: none;
  height: 12px;
}

/* CONTROLES */
.controles button {
  background: linear-gradient(45deg, #00ff88, #ff2e88);
  border: none;
  padding: 10px 15px;
  margin: 5px;
  border-radius: 50%;
  font-size: 18px;
  cursor: pointer;
}

/* SECCIONES */
.seccion {
  font-size: 16px;
  color: #1db954;
  margin-top: 15px;
  margin-bottom: 5px;
  font-weight: bold;
  cursor: pointer;
}

.contenido {
  display: none;
}

.contenido.activo {
  display: block;
}
</style>
</head>

<body>

<!-- REPRODUCTOR -->
<div class="reproductor">

  <div class="placa">

    <div class="caratula">
      <img id="cover" src="" alt="cover">
    </div>

    <div class="titulo" id="titulo">Selecciona una canción</div>

    <div class="dedicatoria">
      <div id="de">De: ---</div>
      <div id="para">Para: ---</div>
    </div>

    <div class="ondas" id="ondas"></div>

    <div class="controles">
      <button onclick="player.play()">▶</button>
      <button onclick="player.pause()">⏸</button>
    </div>

    <div class="codigo" id="codigo">Código: ---</div>

    <audio id="player"></audio>

  </div>

</div>

<!-- LISTA -->
<div class="lista">

  <div class="seccion" onclick="toggle('listaContenido')">📜 Lista de reproducción</div>

  <div id="listaContenido" class="contenido activo">
    <div class="item" onclick="playMusic('El Cielo se Viste de Fiesta.mp3')">🎵 El Cielo se Viste de Fiesta</div>
    <div class="item" onclick="playMusic('Jehová Te Cuide Yuliana.mp3')">🎵 Jehová Te Cuide Yuliana</div>
  </div>

  <div class="seccion" onclick="toggle('masReproducido')">❤️ Más reproducido</div>
  <div id="masReproducido" class="contenido"></div>

  <div class="seccion" onclick="toggle('ultimas')">🔥 Últimas reproducciones</div>
  <div id="ultimas" class="contenido"></div>

</div>

<script>

const playlist = [
  {
    file: "El Cielo se Viste de Fiesta.mp3",
    title: "El Cielo se Viste de Fiesta",
    code: "AMU-001",
    cover: "cover1.jpg",
    de: "Marcelo y Familia",
    para: "Yuliana"
  },
  {
    file: "Jehová Te Cuide Yuliana.mp3",
    title: "Jehová Te Cuide Yuliana",
    code: "AMU-002",
    cover: "cover2.jpg",
    de: "Marcelo",
    para: "Yuliana"
  }
];

let currentIndex = 0;
const player = document.getElementById("player");

let reproducciones = JSON.parse(localStorage.getItem("reproducciones")) || {};
let historial = JSON.parse(localStorage.getItem("historial")) || [];

/* ONDAS */
const ondasContainer = document.getElementById("ondas");
for (let i = 0; i < 25; i++) {
  const bar = document.createElement("span");
  bar.style.animationDelay = (i * 0.05) + "s";
  ondasContainer.appendChild(bar);
}

/* UI */
function updateUI(song) {
  document.getElementById("titulo").innerText = song.title;
  document.getElementById("codigo").innerText = "Código: " + song.code;
  document.getElementById("cover").src = song.cover || "";
  document.getElementById("de").innerText = "De: " + (song.de || "---");
  document.getElementById("para").innerText = "Para: " + (song.para || "---");
}

/* PLAY */
function playSong(index) {
  currentIndex = index;
  const song = playlist[index];

  player.src = song.file;
  player.play();

  updateUI(song);
  document.getElementById("ondas").classList.remove("pausa");
}

function playMusic(file) {
  const index = playlist.findIndex(s => s.file === file);
  if (index === -1) return;

  registrarReproduccion(file);
  playSong(index);
}

/* HISTORIAL */
function registrarReproduccion(file) {
  reproducciones[file] = (reproducciones[file] || 0) + 1;

  historial.unshift(file);
  historial = historial.slice(0, 5);

  localStorage.setItem("reproducciones", JSON.stringify(reproducciones));
  localStorage.setItem("historial", JSON.stringify(historial));

  actualizarSecciones();
}

/* SECCIONES */
function actualizarSecciones() {

  const contTop = document.getElementById("masReproducido");
  contTop.innerHTML = "";

  Object.entries(reproducciones)
    .sort((a,b) => b[1] - a[1])
    .slice(0,3)
    .forEach(([file, count]) => {
      const song = playlist.find(s => s.file === file);
      if (!song) return;

      const div = document.createElement("div");
      div.className = "item";
      div.innerText = `🎵 ${song.title} (${count})`;
      div.onclick = () => playSong(playlist.indexOf(song));
      contTop.appendChild(div);
    });

  const contUlt = document.getElementById("ultimas");
  contUlt.innerHTML = "";

  [...new Set(historial)].forEach(file => {
    const song = playlist.find(s => s.file === file);
    if (!song) return;

    const div = document.createElement("div");
    div.className = "item";
    div.innerText = `🎵 ${song.title}`;
    div.onclick = () => playSong(playlist.indexOf(song));
    contUlt.appendChild(div);
  });
}

/* EVENTOS */
player.addEventListener("ended", function () {
  currentIndex++;
  if (currentIndex >= playlist.length) currentIndex = 0;
  playSong(currentIndex);
});

player.addEventListener("pause", () => {
  document.getElementById("ondas").classList.add("pausa");
});

player.addEventListener("play", () => {
  document.getElementById("ondas").classList.remove("pausa");
});

/* TOGGLE */
function toggle(id) {
  document.getElementById(id).classList.toggle("activo");
}

actualizarSecciones();

</script>

</body>
</html>

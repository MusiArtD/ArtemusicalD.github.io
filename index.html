<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Audio Player Pro</title>
<style>
body{
  background:#111;
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  font-family:Arial;
}
.player{
  width:360px;
  background:#1c1c1c;
  border-radius:18px;
  padding:18px;
  box-shadow:0 10px 30px rgba(0,0,0,.5);
}
.title{
  color:#fff;
  font-size:14px;
  margin-bottom:10px;
  opacity:.8;
}
.controls{
  display:flex;
  align-items:center;
  gap:12px;
}
.play{
  width:44px;
  height:44px;
  border-radius:50%;
  background:#2b2b2b;
  display:flex;
  align-items:center;
  justify-content:center;
  cursor:pointer;
  transition:.3s;
  position:relative;
  overflow:hidden;
}
.play:hover{
  background:#3a3a3a;
}
.play span{
  color:#fff;
  font-size:18px;
  transition:.25s;
}

/* BARRA INTEGRADA PRO */
.progress-wrap{
  flex:1;
  height:10px;
  background:#2a2a2a;
  border-radius:999px;
  position:relative;
  overflow:hidden;
  display:flex;
  align-items:center;
}
.progress-fill{
  position:absolute;
  height:100%;
  width:0%;
  background:linear-gradient(90deg,#00d4ff,#7c4dff);
  border-radius:999px;
  transition:width .1s linear;
}

/* efecto “fantasma” integrado */
.progress-glow{
  position:absolute;
  width:30px;
  height:100%;
  background:rgba(255,255,255,.15);
  filter:blur(4px);
  animation:glow 1.2s infinite linear;
}

@keyframes glow{
  from{transform:translateX(-30px);}
  to{transform:translateX(360px);}
}

.time{
  color:#aaa;
  font-size:11px;
  margin-top:8px;
  display:flex;
  justify-content:space-between;
}
</style>
</head>
<body>

<div class="player">
  <div class="title">Reproduciendo: Demo Track</div>

  <div class="controls">
    <div class="play" onclick="togglePlay()">
      <span id="icon">▶</span>
    </div>

    <div class="progress-wrap" onclick="seek(event)">
      <div class="progress-fill" id="bar"></div>
      <div class="progress-glow"></div>
    </div>
  </div>

  <div class="time">
    <span id="current">0:00</span>
    <span id="total">3:45</span>
  </div>

  <audio id="audio" src="tu-audio.mp3"></audio>
</div>

<script>
const audio = document.getElementById('audio');
const bar = document.getElementById('bar');
const icon = document.getElementById('icon');
const current = document.getElementById('current');
const total = document.getElementById('total');

let playing = false;

function togglePlay(){
  if(!playing){
    audio.play();
    icon.textContent = '⏸';
  }else{
    audio.pause();
    icon.textContent = '▶';
  }
  playing = !playing;
}

audio.ontimeupdate = () => {
  const percent = (audio.currentTime / audio.duration) * 100;
  bar.style.width = percent + '%';

  current.textContent = format(audio.currentTime);
};

audio.onloadedmetadata = () => {
  total.textContent = format(audio.duration);
};

function format(s){
  let m = Math.floor(s/60);
  let sec = Math.floor(s%60);
  return m + ':' + (sec<10?'0':'') + sec;
}

function seek(e){
  const rect = e.currentTarget.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const percent = x / rect.width;
  audio.currentTime = percent * audio.duration;
}
</script>

</body>
</html>

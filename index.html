<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Música</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* LISTA */
.lista {
  width: 35%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover {
  background: #3a3a3a;
}

/* REPRODUCTOR */
.reproductor {
  width: 65%;
  padding: 20px;
}

/* PLACA */
.placa {
  background: linear-gradient(145deg, #1a1a1a, #222);
  border-radius: 20px;
  padding: 25px;
  width: 80%;
  margin: auto;
  box-shadow: 0 0 25px rgba(0,0,0,0.6);
  text-align: center;
}

/* CARATULA */
.caratula img {
  width: 100%;
  max-width: 250px;
  border-radius: 12px;
}

/* TEXTOS */
.titulo { font-size: 22px; color: #1db954; margin-top: 10px; }
.dedicatoria { margin-top: 10px; color: #ccc; font-size: 14px; }
.codigo { font-size: 14px; color: #aaa; margin-top: 5px; }
.fecha { font-size: 12px; color: #888; margin-top: 5px; }

/* ONDAS */
.ondas {
  display: flex;
  justify-content: center;
  align-items: flex-end;
  height: 50px;
  margin: 15px 0;
}

.ondas span {
  width: 4px;
  height: 10px;
  margin: 0 2px;
  background: #00e5ff;
  animation: onda 1s infinite ease-in-out;
}

@keyframes onda {
  0% { height: 10px; }
  50% { height: 40px; }
  100% { height: 10px; }
}

.pausa span {
  animation: none;
  height: 12px;
}

/* CONTROLES */
.controles {
  margin-top: 10px;
}

.controles button {
  background: linear-gradient(45deg, #00e5ff, #00ff88);
  border: none;
  padding: 10px;
  margin: 5px;
  border-radius: 50%;
  font-size: 16px;
  cursor: pointer;
}

/* BARRA PROGRESO */
.progreso {
  width: 100%;
  height: 6px;
  background: #333;
  border-radius: 10px;
  margin-top: 15px;
  cursor: pointer;
}

.progreso-barra {
  height: 100%;
  width: 0%;
  background: #00e5ff;
  box-shadow: 0 0 10px #00e5ff;
  border-radius: 10px;
}

/* SECCIONES */
.seccion {
  font-size: 16px;
  color: #1db954;
  margin-top: 15px;
  margin-bottom: 5px;
  font-weight: bold;
  cursor: pointer;
}

.contenido { display: none; }
.contenido.activo { display: block; }

</style>
</head>

<body>

<!-- REPRODUCTOR -->
<div class="reproductor">
  <div class="placa">

    <div class="caratula">
      <img id="cover" src="">
    </div>

    <div class="titulo" id="titulo">Selecciona una canción</div>

    <div class="dedicatoria">
      <div id="de">De: ---</div>
      <div id="para">Para: ---</div>
    </div>

    <div class="codigo" id="codigo">Código: ---</div>
    <div class="fecha" id="fecha">Agregado: ---</div>

    <div class="ondas" id="ondas"></div>

    <!-- BARRA -->
    <div class="progreso" onclick="seek(event)">
      <div class="progreso-barra" id="barra"></div>
    </div>

    <!-- CONTROLES -->
    <div class="controles">
      <button onclick="prev()">⏮</button>
      <button onclick="player.play()">▶</button>
      <button onclick="player.pause()">⏸</button>
      <button onclick="next()">⏭</button>
      <button onclick="toggleShuffle()">🔀</button>
      <button onclick="toggleLoop()">🔁</button>
    </div>

    <audio id="player"></audio>

  </div>
</div>

<!-- LISTA -->
<div class="lista">
  <div class="seccion" onclick="toggle('listaContenido')">📜 Lista</div>
  <div id="listaContenido" class="contenido activo">
    <div class="item" onclick="playMusic('El Cielo se Viste de Fiesta.mp3')">🎵 El Cielo se Viste de Fiesta</div>
    <div class="item" onclick="playMusic('Jehová Te Cuide Yuliana.mp3')">🎵 Jehová Te Cuide Yuliana</div>
  </div>
</div>

<script>

const playlist = [
{
file:"El Cielo se Viste de Fiesta.mp3",
title:"El Cielo se Viste de Fiesta",
code:"AMU-001",
cover:"mis-15.jpg",
de:"Padres",
para:"Yuliana"
},
{
file:"Jehová Te Cuide Yuliana.mp3",
title:"Jehová Te Cuide Yuliana",
code:"AMU-002",
cover:"cover2.jpg",
de:"Padres",
para:"Yuliana"
}
];

let currentIndex = 0;
let shuffle = false;
let loop = false;

const player = document.getElementById("player");

/* ONDAS */
const ondas = document.getElementById("ondas");
for(let i=0;i<25;i++){
let s=document.createElement("span");
s.style.animationDelay=(i*0.05)+"s";
ondas.appendChild(s);
}

/* UI */
function updateUI(song){
document.getElementById("titulo").innerText=song.title;
document.getElementById("codigo").innerText="Código: "+song.code;
document.getElementById("cover").src=song.cover;
document.getElementById("de").innerText="De: "+song.de;
document.getElementById("para").innerText="Para: "+song.para;

/* FECHA */
let fechas = JSON.parse(localStorage.getItem("fechas")) || {};
if(!fechas[song.file]){
fechas[song.file]=new Date().toLocaleString();
localStorage.setItem("fechas",JSON.stringify(fechas));
}
document.getElementById("fecha").innerText="Agregado: "+fechas[song.file];
}

/* PLAY */
function playSong(i){
currentIndex=i;
let song=playlist[i];
player.src=song.file;
player.play();
updateUI(song);
}

/* CONTROL */
function next(){
if(shuffle){
playSong(Math.floor(Math.random()*playlist.length));
}else{
currentIndex=(currentIndex+1)%playlist.length;
playSong(currentIndex);
}
}

function prev(){
currentIndex=(currentIndex-1+playlist.length)%playlist.length;
playSong(currentIndex);
}

function toggleShuffle(){ shuffle=!shuffle; }
function toggleLoop(){ loop=!loop; }

/* AUTO */
player.addEventListener("ended",()=>{
if(loop){
playSong(currentIndex);
}else{
next();
}
});

/* PROGRESO */
player.addEventListener("timeupdate",()=>{
let p=(player.currentTime/player.duration)*100;
document.getElementById("barra").style.width=p+"%";
});

function seek(e){
let rect=e.currentTarget.getBoundingClientRect();
let x=e.clientX-rect.left;
let pct=x/rect.width;
player.currentTime=pct*player.duration;
}

/* PLAY CLICK */
function playMusic(file){
let i=playlist.findIndex(s=>s.file===file);
if(i!=-1) playSong(i);
}

/* UI */
function toggle(id){
document.getElementById(id).classList.toggle("activo");
}

</script>

</body>
</html>

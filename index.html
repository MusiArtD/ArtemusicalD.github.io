<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Saund Music</title>

<style>
body {
  margin:0;
  font-family:Arial;
  background:#121212;
  color:white;
  display:flex;
}

/* LISTA */
.lista {
  width:35%;
  background:#1e1e1e;
  height:100vh;
  overflow-y:auto;
  padding:10px;
}

.item {
  padding:12px;
  margin:8px 0;
  background:#2a2a2a;
  cursor:pointer;
  border-radius:6px;
}

.item:hover { background:#3a3a3a; }

/* REPRODUCTOR */
.reproductor { width:65%; padding:20px; }

.placa {
  background:linear-gradient(145deg,#1a1a1a,#222);
  border-radius:20px;
  padding:25px;
  width:80%;
  margin:auto;
}

/* CARATULA */
.caratula { text-align:center; }
.caratula img {
  width:100%;
  max-width:400px;
  border-radius:12px;
}

/* ONDAS */
.ondas {
  display:flex;
  justify-content:center;
  height:50px;
  margin:10px 0;
}
.ondas span {
  width:4px;
  margin:0 2px;
  background:#00e5ff;
  animation:onda 1s infinite;
}
@keyframes onda {
  0%{height:10px;}
  50%{height:40px;}
  100%{height:10px;}
}
.pausa span { animation:none; height:12px; }

/* PROGRESO */
.progreso {
  width:50%;
  max-width:600px;
  margin:15px auto;
  height:6px;
  background:#333;
  border-radius:10px;
  cursor:pointer;
}
.barra {
  height:100%;
  width:0%;
  background:#00e5ff;
  box-shadow:0 0 8px #00e5ff;
}

/* CONTROLES ALINEADOS */
.controles {
  display:flex;
  justify-content:space-between;
  align-items:center;
  width:50%;
  max-width:600px;
  margin:15px auto;
}

.left-controls,
.center-controls,
.right-controls {
  display:flex;
  align-items:center;
}

.center-controls {
  flex:1;
  justify-content:center;
  gap:12px;
}

.right-controls {
  gap:4px;
}

.right-controls span {
  margin:0 -4px;
  color:#00e5ff;
  font-weight:bold;
}

/* BOTONES */
.ctrl {
  background:transparent;
  border:none;
  cursor:pointer;
  width:50px;
  height:50px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#00e5ff;
  transition:0.2s;
}

.ctrl svg {
  width:26px;
  height:26px;
  fill:currentColor;
}

.ctrl:hover { transform:scale(1.15); color:#fff; }

.ctrl.active { color:#1db954; }

.ctrl.main {
  width:60px;
  height:60px;
}

</style>
</head>

<body>

<div class="reproductor">
<div class="placa">

<div class="caratula">
<img id="cover" src="logo-temporal.png">
<p id="mensajeInicial">Elegir canción para empezar</p>
</div>

<div class="ondas" id="ondas"></div>

<div class="progreso" onclick="seek(event)">
<div class="barra" id="barra"></div>
</div>

<!-- CONTROLES -->
<div class="controles">

<div class="left-controls">
<button class="ctrl" id="shuffle" onclick="toggleShuffle()">
<svg viewBox="0 0 24 24"><path d="M16 3h5v5h-2V6.41l-4.29 4.3-1.42-1.42L17.59 5H16V3zM3 7h5l6 6-6 6H3v-2h4.59l4.59-4.59L7.59 9H3V7zm13 10h1.59l-2.29 2.29 1.42 1.42L21 14v5h-5v-2z"/></svg>
</button>
</div>

<div class="center-controls">
<button class="ctrl" onclick="prev()">
<svg viewBox="0 0 24 24"><path d="M6 6h2v12H6V6zm3.5 6l10.5 6V6L9.5 12z"/></svg>
</button>

<button class="ctrl main" id="playBtn" onclick="togglePlay()">
<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
</button>

<button class="ctrl" onclick="next()">
<svg viewBox="0 0 24 24"><path d="M16.5 12L6 6v12l10.5-6zM18 6h2v12h-2V6z"/></svg>
</button>

<button class="ctrl" id="loop" onclick="toggleLoop()">
<svg viewBox="0 0 24 24"><path d="M17 17H7v-3l-4 4 4 4v-3h10v-2zm0-10V4l4 4-4 4V9H7v2h10z"/></svg>
</button>
</div>

<div class="right-controls">
<button class="ctrl" id="volDownBtn">
<svg viewBox="0 0 24 24"><path d="M5 11h14v2H5z"/></svg>
</button>

<span>VOL</span>

<button class="ctrl" id="volUpBtn">
<svg viewBox="0 0 24 24"><path d="M11 5h2v14h-2zM5 11h14v2H5z"/></svg>
</button>
</div>

</div>

<audio id="player"></audio>

</div>
</div>

<script>

const player=document.getElementById("player");

let shuffle=false, loop=false;

/* ONDAS */
let ondas=document.getElementById("ondas");
for(let i=0;i<25;i++){
let s=document.createElement("span");
s.style.animationDelay=(i*0.05)+"s";
ondas.appendChild(s);
}

/* CONTROLES */
function togglePlay(){
player.paused ? player.play() : player.pause();
}

function toggleShuffle(){
shuffle=!shuffle;
document.getElementById("shuffle").classList.toggle("active",shuffle);
}

function toggleLoop(){
loop=!loop;
document.getElementById("loop").classList.toggle("active",loop);
}

/* VOLUMEN CLICK + HOLD */
function changeVolume(step){
player.volume=Math.min(1,Math.max(0,player.volume+step));
}

document.getElementById("volUpBtn").onclick=()=>changeVolume(0.1);
document.getElementById("volDownBtn").onclick=()=>changeVolume(-0.1);

let volInterval;

function startHold(step){
volInterval=setInterval(()=>changeVolume(step),100);
}

function stopHold(){ clearInterval(volInterval); }

document.getElementById("volUpBtn").onmousedown=()=>startHold(0.02);
document.getElementById("volDownBtn").onmousedown=()=>startHold(-0.02);

document.getElementById("volUpBtn").onmouseup=stopHold;
document.getElementById("volDownBtn").onmouseup=stopHold;

document.getElementById("volUpBtn").onmouseleave=stopHold;
document.getElementById("volDownBtn").onmouseleave=stopHold;

</script>

</body>
</html>

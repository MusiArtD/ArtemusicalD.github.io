<html lang="es">
<head>
<meta charset="UTF-8">
<title>Saund Music</title>
<link rel="icon" href="logo-temporal.png" type="image/png">

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* LISTA */
.lista {
  width: 35%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover { background: #3a3a3a; }

/* REPRODUCTOR */
.reproductor {
  width: 65%;
  padding: 20px;
}

/* PLACA */
.placa {
  background: linear-gradient(145deg, #1a1a1a, #222);
  border-radius: 20px;
  padding: 25px;
  width: 80%;
  margin: auto;
}

/* CARATULA */
.caratula {
  text-align: center;
}
.caratula img {
  width: 100%;
  max-width: 400px;
  border-radius: 12px;

  display: block;
  margin: 0 auto;
}

/* ONDAS */
.ondas {
  display: flex;
  justify-content: center;
  height: 50px;
  margin: 10px 0;
}
.ondas span {
  width: 4px;
  margin: 0 2px;
  background: #00e5ff;
  animation: onda 1s infinite;
}
@keyframes onda {
  0%{height:10px;}
  50%{height:40px;}
  100%{height:10px;}
}
.pausa span { animation:none; height:12px; }

/* PROGRESO */
.progreso {
  width: 50%;
  max-width: 600px;
  margin: 15px auto;
  height: 6px;
  background: #333;
  border-radius: 10px;
  cursor: pointer;
}

.barra {
  height: 100%;
  width: 0%;
  background: #00e5ff;
  box-shadow: 0 0 8px #00e5ff;
}

/* CONTROLES */
.player-controls {
  display: flex;
  align-items: center;
  justify-content: center;

  gap: 14px;
  margin-top: 12px;
}

.ctrl {
  background: transparent;
  border: none;
  cursor: pointer;

  display: flex;
  align-items: center;
  justify-content: center;

  width: 40px;
  height: 40px;

  color: #777;
  transition: 0.2s;
}

.ctrl.disabled {
  opacity: 0.3;
  filter: grayscale(100%);
  cursor: not-allowed;
}

.volume-group .ctrl {
  font-size: 20px;
  width: 34px;
  height: 34px;
}

.ctrl svg {
  width: 24px;
  height: 24px;
  fill: currentColor;
}

/* hover */
.ctrl:hover {
  color: #1db954;
  transform: scale(1.15);
}

/* activo (shuffle / loop) */
.ctrl.active {
  color: #1db954;
}

/* Volumen */
.volume-group {
  display: flex;
  align-items: center;
  gap: 6px;
  margin-left: 10px;
}

.vol-text {
  font-size: 17px;
  color: #1db954;
  font-weight: bold;
  letter-spacing: 1px;
}

.ctrl.main {
  width: 60px;
  height: 60px;
}

.ctrl.main svg {
  width: 30px;
  height: 30px;
}

/* INFO */
.info {
  max-width: 500px;
  margin: 20px auto;
  text-align: left;
  transform: translateX(40px);  /* 🔥 mueve todo a la derecha */
}

.linea {
  display: flex;
  align-items: center;
  gap: 5px;              /* más controlado */
  margin-bottom: 10px;   /* lo dejas igual */
}
  
.label {
  width: 130px;
  display: flex;
  justify-content: space-between;
  align-items: center;
  color: #1db954;
}

.dos {
  margin-left: auto;
  transform: translateX(-45px);  /* 🔥 mueve 7px a la izquierda */
}

.valor {
  flex: 1;
  transform: translateX(-40px);  /* 🔥 se acerca al ":" */
}

/* SECCIONES */
.seccion {
  color:#1db954;
  margin-top:10px;
  cursor:pointer;
}

.contenido { display:none; }
.contenido.activo { display:block; }

/* 🔥 SOLO LA PRIMERA LINEA (TITULO) */
.info .linea:first-child .label {
  font-size: 23px;
}

.info .linea:first-child .valor {
  font-size: 23px;
  font-weight: 450;
}  

#mensajeInicial {
  margin-top: 15px;
  font-size: 28px; /* 👈 recuperado */
  text-align: center;
  font-weight: bold;

  background: linear-gradient(
    45deg,
    #d4af37,
    #ffd700,
    #fff5b7,
    #d4af37
  );

  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  text-shadow:
    0 0 5px rgba(255, 215, 0, 0.5),
    0 0 10px rgba(255, 215, 0, 0.3);
}

</style>
</head>

<body>

<!-- REPRODUCTOR -->
<div class="reproductor">
<div class="placa">

<div class="caratula">
  <img id="cover" style="display:none;">
  <p id="mensajeInicial">Elegir canción para empezar</p>
</div>

<div class="ondas" id="ondas"></div>

<div class="progreso" onclick="seek(event)">
<div class="barra" id="barra"></div>
</div>

<div class="player-controls">

  <!-- Shuffle -->
<button class="ctrl" id="shuffleBtn" onclick="toggleShuffle()">
    <svg viewBox="0 0 24 24">
      <path d="M16 3h5v5h-2V6.41l-5.29 5.3-1.42-1.42 5.3-5.29H16V3zM3 6h2l3.29 3.29-1.42 1.42L3 6zm18 12v3h-5v-2h1.59l-5.3-5.29 1.42-1.42 5.29 5.3V18h2zM3 18l4.29-4.29 1.42 1.42L5 18H3z"/>
    </svg>
  </button>

  <!-- Previous -->
<button class="ctrl" id="prevBtn" onclick="prev()">
    <svg viewBox="0 0 24 24">
      <path d="M6 6h2v12H6zm3.5 6L18 18V6z"/>
    </svg>
  </button>

  <!-- Play -->
<button class="ctrl main" id="playBtn" onclick="togglePlay()">
    <svg id="playIcon" viewBox="0 0 24 24">
      <path d="M8 5v14l11-7z"/>
    </svg>

    <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none;">
      <path d="M6 5h4v14H6zm8 0h4v14h-4z"/>
    </svg>
  </button>

  <!-- Next -->
<button class="ctrl" id="nextBtn" onclick="next()">
    <svg viewBox="0 0 24 24">
      <path d="M16 6h2v12h-2zM6 6v12l8-6z"/>
    </svg>
  </button>

  <!-- Loop -->
<button class="ctrl" id="loopBtn" onclick="toggleLoop()">
    <svg viewBox="0 0 24 24">
      <path d="M7 7h10v3l4-4-4-4v3H5v6h2V7zm10 10H7v-3l-4 4 4 4v-3h12v-6h-2v5z"/>
    </svg>
  </button>

  <!-- Volumen -->
  <div class="volume-group">
    <button class="ctrl" id="volDownBtn">−</button>
    <span class="vol-text">[VOL]</span>
    <button class="ctrl" id="volUpBtn">+</button>
  </div>

</div>

<!-- INFO CORRECTO -->
<div class="info">

  <div class="linea">
<div class="label">Título <span class="dos">:</span></div>
    <div class="valor" id="titulo">---</div>
  </div>

  <div class="linea">
    <div class="label">De <span class="dos">:</span></div>
    <div class="valor" id="de">---</div>
  </div>

  <div class="linea">
    <div class="label">Para <span class="dos">:</span></div>
    <div class="valor" id="para">---</div>
  </div>

  <div class="linea">
    <div class="label">Código <span class="dos">:</span></div>
    <div class="valor" id="codigo">---</div>
  </div>

  <div class="linea">
    <div class="label">Agregado <span class="dos">:</span></div>
    <div class="valor" id="fecha">---</div>
  </div>

</div>

<audio id="player"></audio>

</div>
</div>

<!-- LISTA -->
<div class="lista">

<div class="seccion" onclick="toggle('listaContenido')">📜 Lista de reproducción</div>
<div id="listaContenido" class="contenido activo"></div>

<div class="seccion" onclick="toggle('mas')">❤️ Más reproducido</div>
<div id="mas" class="contenido"></div>

<div class="seccion" onclick="toggle('ult')">🔥 Últimas</div>
<div id="ult" class="contenido"></div>

</div>

<script>

const playlist=[

// 🔥 canción predeterminada (SIEMPRE índice 0 - NO MOVER - usada por DEFAULT_INDEX)
{
file:"Intro Sound Music 2026.mp3",
title:"Intro Sound Music 2026",
code:"000",
cover:"intro.png",
de:"J.M.P_3Hermanos",
para:"Público en General"
},

{
file:"Amelia Celeste.mp3",
title:"Amelia Celeste",
code:"AMU-001",
cover:"2-años-Amelia.jpg",
de:"tus Padres Flor de Liz y Joaquin",
para:"Amelia Celeste"
}
];

let currentIndex=0, shuffle=false, loop=false;
const player=document.getElementById("player");

/* LISTA DINAMICA */
function renderLista(){
let cont=document.getElementById("listaContenido");
cont.innerHTML="";

playlist.forEach((song, index)=>{
  if(index === 0) return; // 🔥 oculta la predeterminada

let div=document.createElement("div");
div.className="item";
div.innerText="🎵 "+song.title;
div.onclick=()=>playMusic(song.file);
cont.appendChild(div);
});
}
renderLista();

/* ONDAS */
let ondas=document.getElementById("ondas");
for(let i=0;i<25;i++){
let s=document.createElement("span");
s.style.animationDelay=(i*0.05)+"s";
ondas.appendChild(s);
}

/* UI */
function updateUI(song){
if(!song)return;

document.getElementById("titulo").innerText=song.title;
const cover = document.getElementById("cover");

if(song.cover){
  cover.src = song.cover;
  cover.style.display = "block";
}else{
  cover.style.display = "none";
}

document.getElementById("de").innerText=song.de;
document.getElementById("para").innerText=song.para;
document.getElementById("codigo").innerText=song.code;

// ✅ AQUÍ ES EL LUGAR CORRECTO
if(player.currentTime > 0){
  document.getElementById("mensajeInicial").style.display = "none";
}

let fechas=JSON.parse(localStorage.getItem("fechas"))||{};
if(!fechas[song.file]){
fechas[song.file]=new Date().toLocaleString();
localStorage.setItem("fechas",JSON.stringify(fechas));
}
document.getElementById("fecha").innerText=fechas[song.file];
}

/* PLAY */
function playSong(i){

  currentIndex = i;
  let song = playlist[i];

  // 🔥 bloquear si es intro
  if(i === 0){
    bloquearControlesIntro();
  }else{
    desbloquearControles();
  }

  player.pause();
  player.currentTime = 0;
  document.getElementById("barra").style.width = "0%";

  updateUI(song);

  player.src = song.file;
  player.load();
  player.play();
}

/* CONTROLES */
function togglePlay(){
player.paused ? player.play() : player.pause();
}

function next(){

  if(currentIndex === 0){
    avisoUsuario();
    return; // 🔥 BLOQUEO REAL
  }

  if(shuffle){
    currentIndex = Math.floor(Math.random() * (playlist.length - 1)) + 1;
  }else{
    currentIndex++;

    if(currentIndex >= playlist.length){
      currentIndex = 1;
    }
  }

  playSong(currentIndex);
}

  if(shuffle){
    currentIndex = Math.floor(Math.random() * (playlist.length - 1)) + 1;
  }else{
    currentIndex++;

    if(currentIndex >= playlist.length){
      currentIndex = 1; // 🔥 vuelve al primero real (NO intro)
    }
  }

  playSong(currentIndex);
}

function prev(){

  if(currentIndex === 0){
    avisoUsuario();
    return; // 🔥 BLOQUEO REAL
  }

  currentIndex--;

  if(currentIndex <= 0){
    currentIndex = 1;
  }

  playSong(currentIndex);
}

function bloquearControlesIntro() {
  document.getElementById("prevBtn").classList.add("disabled");
  document.getElementById("nextBtn").classList.add("disabled");
  document.getElementById("shuffleBtn").classList.add("disabled");
  document.getElementById("loopBtn").classList.add("disabled");
}

function desbloquearControles() {
  document.getElementById("prevBtn").classList.remove("disabled");
  document.getElementById("nextBtn").classList.remove("disabled");
  document.getElementById("shuffleBtn").classList.remove("disabled");
  document.getElementById("loopBtn").classList.remove("disabled");
}

function toggleShuffle(){

  if(currentIndex === 0){
    avisoUsuario();
    return;
  }

  shuffle = !shuffle;
  document.getElementById("shuffleBtn").classList.toggle("active", shuffle);
}

function toggleLoop(){

  if(currentIndex === 0){
    avisoUsuario();
    return;
  }

  loop = !loop;
  document.getElementById("loopBtn").classList.toggle("active", loop);
}

// 🔥 AQUÍ VA PERFECTO
function avisoUsuario() {
  const msg = document.getElementById("mensajeInicial");

  msg.style.transition = "0.2s";

  let colores = ["#ff0055", "#ffcc00", "#00e5ff"];
  let i = 0;

  let efecto = setInterval(() => {
    msg.style.color = colores[i % colores.length];
    msg.style.textShadow = "0 0 10px " + colores[i % colores.length];
    i++;
  }, 150);

  setTimeout(() => {
    clearInterval(efecto);
    msg.style.color = "";
    msg.style.textShadow = "";
  }, 800);
}

/* EVENTOS */
player.addEventListener("ended",()=>loop?playSong(currentIndex):next());

player.addEventListener("timeupdate",()=>{
if(!player.duration)return;
document.getElementById("barra").style.width=(player.currentTime/player.duration)*100+"%";
});

player.addEventListener("play",()=>{
  document.getElementById("playIcon").style.display="none";
  document.getElementById("pauseIcon").style.display="block";
  ondas.classList.remove("pausa");
});

player.addEventListener("pause",()=>{
  document.getElementById("playIcon").style.display="block";
  document.getElementById("pauseIcon").style.display="none";
  ondas.classList.add("pausa");
});

/* SEEK */
function seek(e){
let r=e.currentTarget.getBoundingClientRect();
player.currentTime=((e.clientX-r.left)/r.width)*player.duration;
}

const volUp = document.getElementById("volUpBtn");
const volDown = document.getElementById("volDownBtn");

let interval;

function changeVolume(amount, btn) {

  if(currentIndex === 0){
    avisoUsuario();
    return;
  }

  player.volume = Math.min(1, Math.max(0, player.volume + amount));

  btn.classList.add("active");

  setTimeout(() => {
    btn.classList.remove("active");
  }, 200);
}

// CLICK
volUp.onclick = () => changeVolume(0.05, volUp);
volDown.onclick = () => changeVolume(-0.05, volDown);

// CLICK SOSTENIDO
volUp.onmousedown = () => {
  volUp.classList.add("active");
  interval = setInterval(() => changeVolume(0.02, volUp), 100);
};

volDown.onmousedown = () => {
  volDown.classList.add("active");
  interval = setInterval(() => changeVolume(-0.02, volDown), 100);
};

document.onmouseup = () => {
  clearInterval(interval);
  volUp.classList.remove("active");
  volDown.classList.remove("active");
};

/* HISTORIAL */
let reproducciones=JSON.parse(localStorage.getItem("reproducciones"))||{};
let historial=JSON.parse(localStorage.getItem("historial"))||[];

function registrarReproduccion(file){
reproducciones[file]=(reproducciones[file]||0)+1;
historial.unshift(file);
historial=historial.slice(0,5);
localStorage.setItem("reproducciones",JSON.stringify(reproducciones));
localStorage.setItem("historial",JSON.stringify(historial));
actualizarSecciones();
}

function actualizarSecciones(){

let contTop=document.getElementById("mas");
contTop.innerHTML="";

Object.entries(reproducciones)
.sort((a,b)=>b[1]-a[1])
.slice(0,3)
.forEach(([file,count])=>{
let s=playlist.find(x=>x.file===file);
if(!s)return;
let d=document.createElement("div");
d.className="item";
d.innerText=`🎵 ${s.title} (${count})`;
d.onclick=()=>playSong(playlist.indexOf(s));
contTop.appendChild(d);
});

let contUlt=document.getElementById("ult");
contUlt.innerHTML="";

[...new Set(historial)].forEach(file=>{
let s=playlist.find(x=>x.file===file);
if(!s)return;
let d=document.createElement("div");
d.className="item";
d.innerText=`🎵 ${s.title}`;
d.onclick=()=>playSong(playlist.indexOf(s));
contUlt.appendChild(d);
});
}

function playMusic(file){
  let i=playlist.findIndex(s=>s.file===file);
  if(i!=-1){
    registrarReproduccion(file);
    playSong(i);

    // 🔥 aquí sí desaparece
    document.getElementById("mensajeInicial").style.opacity = "0";

    setTimeout(() => {
      document.getElementById("mensajeInicial").style.display = "none";
    }, 600);
  }
}

function toggle(id){
document.getElementById(id).classList.toggle("activo");
}

actualizarSecciones();

// 🔥 autoplay inicial
window.addEventListener("load", () => {
  updateUI(playlist[0]);     // 👈 muestra portada y datos
  bloquearControlesIntro();  // 👈 bloquea botones
});

document.addEventListener("click", (e) => {

  // 🔥 SOLO si NO es un botón del reproductor
  if(e.target.closest(".ctrl") || e.target.closest(".item")){
    return;
  }

  playSong(0);

}, { once: true });

</script>

</body>
</html>>

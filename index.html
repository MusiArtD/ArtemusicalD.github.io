<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Música</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* LISTA */
.lista {
  width: 35%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover { background: #3a3a3a; }

/* REPRODUCTOR */
.reproductor {
  width: 65%;
  padding: 20px;
}

/* PLACA */
.placa {
  background: linear-gradient(145deg, #1a1a1a, #222);
  border-radius: 20px;
  padding: 25px;
  width: 80%;
  margin: auto;
  text-align: center;
}

/* CARATULA */
.caratula img {
  width: 100%;
  max-width: 250px;
  border-radius: 12px;
  display: block;
  margin: auto;
}

/* ONDAS */
.ondas {
  display: flex;
  justify-content: center;
  height: 50px;
  margin: 10px 0;
}

.ondas span {
  width: 4px;
  margin: 0 2px;
  background: #00e5ff;
  animation: onda 1s infinite;
}

@keyframes onda {
  0%{height:10px;}
  50%{height:40px;}
  100%{height:10px;}
}

.pausa span { animation:none; height:12px; }

/* PROGRESO */
.progreso {
  max-width: 250px;
  width: calc(100% - 20px);
  margin: 10px auto;
  height: 6px;
  background: #333;
  border-radius: 10px;
  cursor: pointer;
  overflow: hidden;
}

.barra {
  height: 100%;
  width: 0%;
  background: #00e5ff;
  box-shadow: 0 0 8px #00e5ff;
}

/* CONTROLES */
.controles {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 15px;
  margin-top: 10px;
}

.ctrl {
  cursor: pointer;
  font-size: 20px;
  color: #00ff88;
}

.ctrl.main {
  font-size: 28px;
  color: #00e5ff;
}

/* VOLUMEN */
.volumen {
  position: relative;
}

.volumen input {
  display: none;
  position: absolute;
  left: 25px;
}

.volumen:hover input {
  display: block;
}

/* TEXTOS */
.titulo { margin-top:15px; font-size:20px; color:#1db954;}
.titulo.largo {
  font-size: 18px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.dedicatoria { font-size:14px; color:#ccc;}
.codigo { font-size:13px; color:#aaa;}
.fecha { font-size:12px; color:#777;}

/* SECCIONES */
.seccion {
  color:#1db954;
  margin-top:10px;
  cursor:pointer;
}

.contenido { display:none; }
.contenido.activo { display:block; }

.info { margin-top:15px; }

.linea {
  display:flex;
  gap:10px;
  margin:3px 0;
}

.label {
  width:90px;
  color:#1db954;
  font-weight:bold;
}

.valor { flex:1; color:#ccc; }

</style>
</head>

<body>

<!-- REPRODUCTOR -->
<div class="reproductor">
<div class="placa">

<div class="caratula">
<img id="cover">
</div>

<div class="ondas" id="ondas"></div>

<div class="progreso" onclick="seek(event)">
<div class="barra" id="barra"></div>
</div>

<div class="controles">

<span class="ctrl" onclick="toggleShuffle()">🔀</span>
<span class="ctrl" onclick="prev()">⏮</span>

<span id="playBtn" class="ctrl main" onclick="togglePlay()">▶</span>

<span class="ctrl" onclick="next()">⏭</span>
<span class="ctrl" onclick="toggleLoop()">🔁</span>

<div class="volumen">
<span class="ctrl">🔊</span>
<input type="range" min="0" max="1" step="0.01" onchange="setVolume(this.value)">
</div>

</div>

<div class="info">

<div class="linea"><div class="label">Título:</div><div class="valor" id="titulo">---</div></div>
<div class="linea"><div class="label">De:</div><div class="valor" id="de">---</div></div>
<div class="linea"><div class="label">Para:</div><div class="valor" id="para">---</div></div>
<div class="linea"><div class="label">Código:</div><div class="valor" id="codigo">---</div></div>
<div class="linea"><div class="label">Agregado:</div><div class="valor" id="fecha">---</div></div>

</div>

<audio id="player"></audio>

</div>
</div>

<!-- LISTA -->
<div class="lista">

<div class="seccion" onclick="toggle('listaContenido')">📜 Lista</div>
<div id="listaContenido" class="contenido activo">

<div class="item" onclick="playMusic('El Cielo se Viste de Fiesta.mp3')">🎵 El Cielo...</div>
<div class="item" onclick="playMusic('Jehová Te Cuide Yuliana.mp3')">🎵 Jehová...</div>

</div>

<div class="seccion" onclick="toggle('mas')">❤️ Más reproducido</div>
<div id="mas" class="contenido"></div>

<div class="seccion" onclick="toggle('ult')">🔥 Últimas</div>
<div id="ult" class="contenido"></div>

</div>

<script>

const playlist = [
{
file:"El Cielo se Viste de Fiesta.mp3",
title:"El Cielo se Viste de Fiesta",
code:"AMU-001",
cover:"mis-15.jpg",
de:"Padres",
para:"Yuliana"
},
{
file:"Jehová Te Cuide Yuliana.mp3",
title:"Jehová Te Cuide Yuliana",
code:"AMU-002",
cover:"cover2.jpg",
de:"Padres",
para:"Yuliana"
}
];

let currentIndex=0;
let shuffle=false;
let loop=false;

const player=document.getElementById("player");

/* ONDAS */
const ondas=document.getElementById("ondas");
for(let i=0;i<25;i++){
let s=document.createElement("span");
s.style.animationDelay=(i*0.05)+"s";
ondas.appendChild(s);
}

/* UI */
function updateUI(song){

if(!song) return;

const titulo=document.getElementById("titulo");
titulo.innerText=song.title||"---";

if(song.title && song.title.length>40){
titulo.classList.add("largo");
}else{
titulo.classList.remove("largo");
}

document.getElementById("codigo").innerText="Código: "+(song.code||"---");
document.getElementById("cover").src=song.cover||"";
document.getElementById("de").innerText="De: "+(song.de||"---");
document.getElementById("para").innerText="Para: "+(song.para||"---");

let fechas=JSON.parse(localStorage.getItem("fechas"))||{};
if(song.file && !fechas[song.file]){
fechas[song.file]=new Date().toLocaleString();
localStorage.setItem("fechas",JSON.stringify(fechas));
}

document.getElementById("fecha").innerText="Agregado: "+(fechas[song.file]||"---");
}

/* PLAY */
function playSong(i){
if(i<0||i>=playlist.length) return;

currentIndex=i;
let song=playlist[i];

player.src=song.file;
player.play();

updateUI(song);
}

/* PLAY MUSIC */
function playMusic(file){
let i=playlist.findIndex(s=>s.file===file);
if(i!=-1){
playSong(i);
}
}

/* CONTROLES */
function togglePlay(){
if(player.paused){
player.play();
document.getElementById("playBtn").innerText="⏸";
}else{
player.pause();
document.getElementById("playBtn").innerText="▶";
}
}

function next(){
currentIndex=(currentIndex+1)%playlist.length;
playSong(currentIndex);
}

function prev(){
currentIndex=(currentIndex-1+playlist.length)%playlist.length;
playSong(currentIndex);
}

function toggleShuffle(){shuffle=!shuffle;}
function toggleLoop(){loop=!loop;}

/* EVENTOS */
player.addEventListener("ended",()=>{
if(loop) playSong(currentIndex);
else next();
});

player.addEventListener("timeupdate",()=>{
if(!player.duration) return;
let p=(player.currentTime/player.duration)*100;
document.getElementById("barra").style.width=p+"%";
});

player.addEventListener("play",()=>{
document.getElementById("playBtn").innerText="⏸";
document.getElementById("ondas").classList.remove("pausa");
});

player.addEventListener("pause",()=>{
document.getElementById("playBtn").innerText="▶";
document.getElementById("ondas").classList.add("pausa");
});

/* TOGGLE */
function toggle(id){
document.getElementById(id).classList.toggle("activo");
}

/* VOLUMEN */
function setVolume(v){player.volume=v;}

actualizarSecciones = ()=>{};

</script>

</body>
</html>

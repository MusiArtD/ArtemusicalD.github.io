<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Mi Música</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #121212;
  color: white;
  display: flex;
}

/* LISTA */
.lista {
  width: 35%;
  background: #1e1e1e;
  height: 100vh;
  overflow-y: auto;
  padding: 10px;
}

.item {
  padding: 12px;
  margin: 8px 0;
  background: #2a2a2a;
  cursor: pointer;
  border-radius: 6px;
}

.item:hover {
  background: #3a3a3a;
}

/* REPRODUCTOR */
.reproductor {
  width: 65%;
  padding: 20px;
}

audio {
  width: 100%;
  margin-top: 20px;
}

.titulo {
  font-size: 24px;
  color: #1db954;
  margin-top: 10px;
}

.codigo {
  font-size: 14px;
  color: #aaa;
  margin-top: 5px;
}

/* AUTOR */
.autor {
  font-size: 16px;
  color: #ccc;
  margin-top: 5px;
}

/* CORAZON */
.corazon {
  font-size: 24px;
  cursor: pointer;
  margin-left: 10px;
}

.corazon.activo {
  color: red;
}

/* ONDAS */
.ondas {
  display: flex;
  gap: 4px;
  margin-top: 15px;
  height: 40px;
  align-items: flex-end;
}

.barra {
  width: 4px;
  background: #1db954;
  animation: sonido 1s infinite ease-in-out;
}

@keyframes sonido {
  0% { height: 10px; }
  50% { height: 35px; }
  100% { height: 10px; }
}

.pausa .barra {
  animation: none;
  height: 15px;
}

/* ANIMACIONES */
@keyframes latido {
  0% { transform: scale(1); }
  50% { transform: scale(1.2); }
  100% { transform: scale(1); }
}

@keyframes fuego {
  0% { transform: scale(1); }
  50% { transform: scale(1.1); }
  100% { transform: scale(1); }
}

.icono-corazon {
  display: inline-block;
  animation: latido 1s infinite;
}

.icono-fuego {
  display: inline-block;
  animation: fuego 0.8s infinite;
}

/* TITULOS */
.seccion {
  font-size: 16px;
  color: #1db954;
  margin-top: 15px;
  margin-bottom: 5px;
  font-weight: bold;
  cursor: pointer;
}

/* DESPLEGABLES */
.contenido {
  display: none;
}

.contenido.activo {
  display: block;
}
</style>
</head>

<body>

<!-- IZQUIERDA -->
<div class="reproductor">

  <audio id="player" controls></audio>

  <div>
    <span class="titulo" id="titulo">Selecciona una canción</span>
    <span id="like" class="corazon" onclick="toggleLike()">♡</span>
  </div>

  <div class="autor" id="autor">Autor: ---</div>
  <div class="codigo" id="codigo">Código: ---</div>

  <div id="ondas" class="ondas"></div>

</div>

<!-- DERECHA -->
<div class="lista">

  <div class="seccion" onclick="toggle('listaContenido')">📜 Lista de reproducción</div>

  <div id="listaContenido" class="contenido activo">

    <div class="item" onclick="playMusic('El Cielo se Viste de Fiesta.mp3')">🎵 El Cielo se Viste de Fiesta</div>
    <div class="item" onclick="playMusic('Jehová Te Cuide Yuliana.mp3')">🎵 Jehová Te Cuide Yuliana</div>

  </div>

  <div class="seccion" onclick="toggle('masReproducido')">
    <span class="icono-corazon">❤️</span> Más reproducido
  </div>
  <div id="masReproducido" class="contenido"></div>

  <div class="seccion" onclick="toggle('ultimas')">
    <span class="icono-fuego">🔥</span> Últimas reproducciones
  </div>
  <div id="ultimas" class="contenido"></div>

</div>

<script>

const playlist = [
  { file: "El Cielo se Viste de Fiesta.mp3", title: "El Cielo se Viste de Fiesta", code: "AMU-001", de: "Flor de Liz y Vicente", para: "Yuliana", color: "#1db954" },
  { file: "Jehová Te Cuide Yuliana.mp3", title: "Jehová Te Cuide Yuliana", code: "AMU-002", de: "Flor de Liz y Vicente", para: "Yuliana", color: "#ff4d4d" }
];

let currentIndex = 0;
const player = document.getElementById("player");

let reproducciones = JSON.parse(localStorage.getItem("reproducciones")) || {};
let historial = JSON.parse(localStorage.getItem("historial")) || [];

function generarOndas(color) {
  const cont = document.getElementById("ondas");
  cont.innerHTML = "";

  for (let i = 0; i < 20; i++) {
    const barra = document.createElement("div");
    barra.className = "barra";
    barra.style.background = color;
    barra.style.animationDelay = (i * 0.1) + "s";
    cont.appendChild(barra);
  }
}

function playSong(index) {
  currentIndex = index;
  const song = playlist[index];

  player.src = song.file;
  player.play();

  document.getElementById("titulo").innerText = song.title;
  document.getElementById("codigo").innerText = "Código: " + song.code;
  document.getElementById("autor").innerText = "Autor: " + song.autor;

  generarOndas(song.color);
  document.getElementById("ondas").classList.remove("pausa");

  preloadNext();
}

function playMusic(file) {
  const index = playlist.findIndex(s => s.file === file);
  if (index === -1) return;

  registrarReproduccion(file);
  playSong(index);
}

function registrarReproduccion(file) {
  reproducciones[file] = (reproducciones[file] || 0) + 1;

  historial.unshift(file);
  historial = historial.slice(0, 5);

  localStorage.setItem("reproducciones", JSON.stringify(reproducciones));
  localStorage.setItem("historial", JSON.stringify(historial));

  actualizarSecciones();
}

function actualizarSecciones() {

  const contTop = document.getElementById("masReproducido");
  contTop.innerHTML = "";

  Object.entries(reproducciones)
    .sort((a,b) => b[1] - a[1])
    .slice(0,3)
    .forEach(([file, count]) => {
      const song = playlist.find(s => s.file === file);
      if (!song) return;

      const div = document.createElement("div");
      div.className = "item";
      div.innerText = `🎵 ${song.title} (${count})`;
      div.onclick = () => playSong(playlist.indexOf(song));
      contTop.appendChild(div);
    });

  const contUlt = document.getElementById("ultimas");
  contUlt.innerHTML = "";

  [...new Set(historial)].forEach(file => {
    const song = playlist.find(s => s.file === file);
    if (!song) return;

    const div = document.createElement("div");
    div.className = "item";
    div.innerText = `🎵 ${song.title}`;
    div.onclick = () => playSong(playlist.indexOf(song));
    contUlt.appendChild(div);
  });
}

function preloadNext() {
  let nextIndex = currentIndex + 1;
  if (nextIndex >= playlist.length) nextIndex = 0;

  const audioPreload = new Audio();
  audioPreload.src = playlist[nextIndex].file;
}

player.addEventListener("ended", function () {
  currentIndex++;
  if (currentIndex >= playlist.length) currentIndex = 0;
  playSong(currentIndex);
});

player.addEventListener("pause", () => {
  document.getElementById("ondas").classList.add("pausa");
});

player.addEventListener("play", () => {
  document.getElementById("ondas").classList.remove("pausa");
});

function toggle(id) {
  document.getElementById(id).classList.toggle("activo");
}

function toggleLike() {
  const btn = document.getElementById("like");
  btn.classList.toggle("activo");
  btn.innerText = btn.classList.contains("activo") ? "❤️" : "♡";
}

actualizarSecciones();

</script>

</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Comentarios</title>

  <style>

  .comentarios{
    width: 25%;
    background:#181818;
    padding:15px;
    border-left:1px solid #333;
  }

  .info-comentario{
    display:flex;
    justify-content:space-between;
    gap:5px;
    margin-bottom:10px;
  }

  .box{
    background:#2a2a2a;
    padding:8px;
    border-radius:6px;
    font-size:12px;
    text-align:center;
    flex:1;
  }

  .input-comentario{
    width:100%;
    height:120px;
    background:#1e1e1e;
    border:none;
    color:white;
    padding:10px;
    border-radius:8px;
    resize:none;
  }

  .btn-comentario{
    width:100%;
    margin-top:10px;
    padding:10px;
    background:#1db954;
    border:none;
    color:white;
    border-radius:8px;
    cursor:pointer;
  }

  </style>

</head>

<body>

<div class="comentarios">

  <div class="info-comentario">

    <div class="box">Visitante</div>
    <div class="box">0 comentarios</div>
    <div class="box">WhatsApp</div>

  </div>

  <textarea placeholder="Deja tu comentario..." class="input-comentario"></textarea>

  <button class="btn-comentario">Enviar</button>

</div>

</body>
</html>
